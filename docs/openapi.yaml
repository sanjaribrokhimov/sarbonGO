                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ReferenceCargoResponse" }

  /v1/reference/company:
    get:
      tags: ["Reference / Company"]
      summary: "Справочник Company — типы компании, статусы, роли"
      description: "Роли возвращаются из БД (id, name, description). Используйте role_id при приглашении и смене роли."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
