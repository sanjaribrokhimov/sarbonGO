openapi: 3.0.3
info:
  title: Sarbon API — документация и руководство
  version: 0.1.0
  description: |
    **Sarbon** — API для логистики и грузоперевозок: водители, диспетчеры, компании, грузы, офферы, рейсы. Полное руководство по API на русском языке: потоки (flow), логика, описание полей и примеры.

    **Как пользоваться Swagger:**
    1. Нажмите **Authorize** и укажите заголовки: **X-Device-Type** (web / ios / android), **X-Language** (ru / uz / en / tr / zh), **X-Client-Token**. Они обязательны для всех запросов к /v1 и /api.
    2. Для методов, требующих авторизации, дополнительно укажите **X-User-Token** (JWT access_token после входа водителя, диспетчера или админа).
    3. Вкладки (теги) сверху группируют методы по ролям: водители, диспетчеры, админ, грузы (Cargo), чат, компании, справочники (Reference).

    **Категории API:** Водители (Drivers) — регистрация, профиль, KYC, рейсы; Фриланс-диспетчеры — вход, профиль, создание грузов, приглашения водителей, назначение на рейсы; Админ — компании и владельцы; Грузы (Cargo) — создание, список, офферы, принятие оффера; Справочники (Reference) — города, типы кузова, статусы.
    В каждом разделе вверху дано краткое описание потока; у схем и методов — подробные русские пояснения к полям.

    **Полная документация на русском:** см. файл docs/DOCUMENTATION-RU.md в репозитории.

servers:
  - url: /

security:
  - DeviceTypeHeader: []
    LanguageHeader: []
    ClientTokenHeader: []

tags:
  - name: Drivers / Auth
    description: |
      **Руководство: Авторизация водителя (мобильное приложение)**

      **Кто вызывает:** Водитель (мобильное приложение). После входа все запросы к профилю и регистрации — с заголовком X-User-Token = access_token.

      **Поток входа (существующий водитель):** 1) POST /v1/auth/phone (phone) → OTP отправлен через Telegram Gateway. 2) POST /v1/auth/otp/verify (phone, otp) → status=login и tokens (access_token, refresh_token). Дальше запросы с X-User-Token.

      **Поток для нового номера:** 1) auth/phone → 2) auth/otp/verify → status=register и session_id (JWT пока нет). Дальше POST /v1/registration/start с session_id, name, oferta_accepted → создаётся профиль и выдаются tokens.

      **Данные:** phone в формате +998XXXXXXXXX; otp — код из Telegram/смс. Refresh: POST /v1/auth/refresh (refresh_token). Logout: POST /v1/auth/logout (refresh_token или access_token).
  - name: Drivers / Registration
    description: |
      **Руководство: Регистрация и шаги водителя**

      **Кто вызывает:** Водитель (мобильное приложение), с JWT после auth или после registration/start.

      **Шаги (registration_step):** name-oferta → geo-push → transport-type. **Статусы (registration_status):** start → basic → full.

      **Поток:** 1) registration/start (session_id, name, oferta_accepted) — создаёт запись в drivers, step=name-oferta. 2) geo-push (latitude, longitude, push_token опц.) — шаг geo-push при указании гео. 3) transport-type (driver_type, power_plate_type, trailer_plate_type) — step=transport-type, status=basic. Справочники типов транспорта: GET /v1/transport-options.
  - name: Drivers / KYC
    description: |
      **Руководство: KYC (документы водителя)**

      **Кто вызывает:** Водитель (мобильное приложение), с JWT.

      **Поток:** Один запрос PATCH /v1/kyc с блоками driver_data (паспорт, PINFL, driver_scan_status), power_data (ТС: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп: то же), driver_owner (true/false). registration_status=full выставляется только когда все обязательные поля заполнены и scan_status подтверждены; прицеп можно не указывать или заполнить полностью.
  - name: Drivers / Profile
    description: |
      **Руководство: Профиль водителя**

      **Кто вызывает:** Водитель (мобильное приложение). Все методы требуют X-User-Token (JWT).

      **Поток и данные:** GET /v1/profile — получить профиль (все поля). PATCH /v1/profile/driver — изменить имя, work_status, паспорт. PATCH /v1/profile/power — данные тягача; PATCH /v1/profile/trailer — данные прицепа. PUT /v1/profile/heartbeat — обновить гео (latitude, longitude); last_online_at опционален, также обновляется автоматически при каждом запросе водителя. Смена телефона: .../phone-change/request (new_phone) → OTP; .../phone-change/verify (session_id, otp). DELETE /v1/profile — удалить аккаунт (архивация в deleted_drivers).
  - name: Freelance Dispatchers / Auth
    description: |
      **Руководство: Авторизация диспетчеров**

      **Роли:** Пользователь — freelance-диспетчер (таблица freelance_dispatchers). После входа получает JWT; заголовок X-User-Token = access_token для всех запросов под /v1/dispatchers/* (профиль, смена пароля и т.д.).

      **Поток входа (существующий диспетчер):**
      1. POST /v1/dispatchers/auth/phone — отправить OTP на телефон (через Telegram Gateway).
      2. POST /v1/dispatchers/auth/otp/verify — ввести OTP → в ответе status=login и tokens (expires_at, refresh_expires_at — Unix).
      Либо вход по паролю: POST /v1/dispatchers/auth/login/password (phone + password) → tokens.

      **Поток сброса пароля:**
      1. POST /v1/dispatchers/auth/reset-password/request (phone) → OTP отправлен, session_id.
      2. POST /v1/dispatchers/auth/reset-password/confirm (session_id, otp, new_password) → пароль обновлён.

      **Refresh:** POST /v1/dispatchers/auth/refresh — тело { "refresh_token": "..." }; в ответе новая пара токенов (expires_at, refresh_expires_at — Unix).
      **Logout:** POST /v1/dispatchers/auth/logout (refresh_token или access_token) — инвалидация сессии; при невалидном токене 401.

      **Данные в запросах:** phone в формате +998XXXXXXXXX; otp — код из смс/Telegram; password — только при login/password и reset/confirm.
  - name: Freelance Dispatchers / Registration
    description: |
      **Руководство: Регистрация нового диспетчера**

      **Поток (новый номер телефона):**
      1. POST /v1/dispatchers/auth/phone — отправить OTP.
      2. POST /v1/dispatchers/auth/otp/verify — ввести OTP → в ответе status=register и session_id (JWT пока не выдаётся).
      3. POST /v1/dispatchers/registration/complete — передать session_id, name, password, passport_series, passport_number, pinfl (обязательно). В ответе — tokens и объект dispatcher; диспетчер считается зарегистрированным.

      **Логика:** Без session_id из шага 2 завершить регистрацию нельзя. После complete диспетчер может входить по phone + password или по OTP.
  - name: Freelance Dispatchers / Profile
    description: |
      **Руководство: Профиль диспетчера**

      **Авторизация:** Все методы требуют заголовок X-User-Token (JWT access_token диспетчера).

      **Поток и данные:**
      - GET /v1/dispatchers/profile — получить текущий профиль (id, name, phone, паспорт, pinfl, work_status, rating, has_photo и т.д.). В ответе data.dispatcher.
      - PATCH /v1/dispatchers/profile — изменить имя, паспорт, pinfl, photo-ссылку (частичное обновление).
      - POST /v1/dispatchers/profile/photo — загрузить фото (multipart/form-data, поле photo). Фото хранится в БД. Макс. 5 MB, image/jpeg или image/png.
      - GET /v1/dispatchers/profile/photo — получить фото диспетчера (бинарный ответ с Content-Type). 404 если фото не загружено.
      - DELETE /v1/dispatchers/profile — удалить аккаунт (жёсткое удаление с архивацией в deleted_freelance_dispatchers).
      - PUT /v1/dispatchers/profile/password — сменить пароль (current_password + new_password).
      - POST .../profile/phone-change/request (new_phone) → OTP; .../phone-change/verify (session_id, otp) → телефон обновлён.
  - name: "Freelance Dispatchers / Добавление груза"
    description: |
      **В первую очередь: добавление груза (фриланс-диспетчер).**
      Диспетчер не создаёт компанию — только аккаунт. Основной сценарий: создать груз, опубликовать, получать офферы, принять оффер, назначить водителя.
      **API:** POST /api/cargo — создать груз (обязателен X-User-Token диспетчера → created_by_type=dispatcher). GET /api/cargo — список грузов. GET /api/cargo/:id — карточка. PUT /api/cargo/:id — изменить. PATCH /api/cargo/:id/status — сменить статус (например на searching). GET /api/cargo/:id/offers — список офферов. POST /api/offers/:id/accept — принять оффер (создаётся рейс). GET /api/trips?cargo_id=, GET /api/trips/:id — рейс по грузу.
  - name: "Freelance Dispatchers / Приглашения водителей"
    description: |
      **Отправка приглашений водителям (фриланс-диспетчер).**
      **Поиск:** GET /v1/dispatchers/drivers/find?phone=... — водители по номеру (совпадения сверху); по id пригласить: POST /v1/dispatchers/driver-invitations (body: driver_id или phone). **Процесс:** 1) Диспетчер: POST /v1/dispatchers/driver-invitations (phone или driver_id) → token. 2) Водитель: GET /v1/driver-invitations — список приглашений; POST .../accept (token) или POST .../decline (token). 4) При принятии: freelancer_id = диспетчер, GET /v1/dispatchers/drivers — список водителей. X-User-Token: dispatcher или driver.
  - name: "Cargo — Freelance dispatcher"
    description: |
      **Грузы для фриланс-диспетчера.** POST /api/cargo (X-User-Token), GET /api/cargo, GET /api/cargo/:id, PUT, PATCH status, POST/GET offers, POST /api/offers/:id/accept. GET /api/trips?cargo_id=, GET /api/trips/:id.
  - name: "Company / Dispatcher (приглашённый)"
    description: |
      **Диспетчер компании — только через приглашение.** GET /v1/dispatchers/companies (мои компании), POST /v1/dispatchers/auth/switch-company. Приглашение: POST /v1/dispatchers/companies/:companyId/invitations, accept, decline.
  - name: "Freelance Dispatchers / My drivers"
    description: |
      **Мои водители.** Найти: GET /v1/dispatchers/drivers/find?phone=... Пригласить без компании: POST /v1/dispatchers/driver-invitations (phone или driver_id). Список: GET /v1/dispatchers/drivers. В компании: POST .../companies/:companyId/driver-invitations.
  - name: Freelance Dispatchers / Trips
    description: |
      **Назначение водителя на рейс.** PATCH /v1/dispatchers/trips/:id/assign-driver (driver_id). Водитель: POST /v1/trips/:id/confirm или reject. Статусы: pending_driver → assigned → loading → en_route → unloading → completed.
  - name: Drivers / Trips
    description: |
      **Рейсы водителя**
      GET /v1/trips — список рейсов, назначенных текущему водителю. POST /v1/trips/:id/confirm — принять назначение (рейс → assigned). POST /v1/trips/:id/reject — отклонить (диспетчер может назначить другого). PATCH /v1/trips/:id/status — смена статуса водителем (loading, en_route, unloading, completed, cancelled). Требуется X-User-Token (driver).
  - name: Drivers / Driver invitations
    description: |
      **Приглашения для водителя: получить список, принять или отказать.**
      **Поток:** 1) GET /v1/driver-invitations — список приглашений (token, type, company_id/dispatcher_id, expires_at). 2) Принять: POST /v1/driver-invitations/accept (body: token). 3) Отказать: POST /v1/driver-invitations/decline (body: token). X-User-Token (driver). Телефон водителя должен совпадать с приглашением. От компании → driver.company_id; от фриланс-диспетчера → driver.freelancer_id.
  - name: Admin / Auth
    description: |
      **Руководство: Авторизация админа (оператор)**

      **Роль:** Админ из таблицы admins (логин/пароль). Используется для доступа к операциям, доступным только админу (например создание компаний).

      **Безопасность:** Для входа (login) сервер проверяет только X-Device-Type, X-Language, X-Client-Token. Все остальные запросы Admin (Companies и т.д.) требуют **обязательно** и X-Client-Token, и X-User-Token (JWT с role=admin); сервер отклоняет запрос при отсутствии или неверном токене.

      **Поток:** POST /v1/admin/auth/login/password — передать login и password. В ответе — tokens (access_token, refresh_token) и объект admin. Далее для запросов под /v1/admin/companies и др. передавать X-User-Token = access_token (и X-Client-Token).
  - name: Admin / Companies
    description: |
      **Руководство: Управление компаниями (только админ)**

      **Безопасность:** Все методы этого раздела доступны **только админам**. Сервер проверяет оба токена: **X-Client-Token** (обязателен для всех /v1) и **X-User-Token** (JWT после /v1/admin/auth/login/password с role=admin). При отсутствии или неверном X-User-Token или при JWT с другой ролью возвращается 401.

      **Поток (два шага):** 1) POST /v1/admin/companies — только создание компании (name обязательно, company_type, inn, address, phone, email, website, license_number, status, лимиты). Владелец не указывается. 2) GET /v1/admin/company-users/owners/search?q=... — поиск владельцев (только role=OWNER) по телефону, имени или фамилии; сортировка по релевантности. 3) PATCH /v1/admin/companies/:id/owner — привязать владельца (owner_id = UUID из company_users с **role=OWNER**). После назначения: у компании — owner_id и status=active, у пользователя в company_users — company_id (двусторонняя связь).
  - name: Reference
    description: |
      **Руководство: Справочники (общие)**

      GET /v1/transport-options — типы машины и прицепа для водителя. Остальные справочники — по категориям ниже (Reference / Drivers, Cargo, Company, Admin, Freelance Dispatchers).
  - name: "Reference / Drivers"
    description: |
      **Справочник для раздела Drivers (водители).** Все допустимые значения статусов и типов — чтобы фронт и мобилка не спрашивали «какие статусы есть».

      **GET /v1/reference/drivers** возвращает (все value в верхнем регистре): registration_step (NAME-OFERTA, GEO-PUSH, TRANSPORT-TYPE, COMPLETED), registration_status (START, BASIC, FULL), driver_type (COMPANY, FREELANCER, DRIVER), work_status (AVAILABLE, LOADED, BUSY), power_plate_types, trailer_plate_types_by_power (TRUCK/TRACTOR → списки прицепов).
  - name: "Reference / Cargo"
    description: |
      **Справочник для раздела Cargo (грузы).** Все статусы груза, точки маршрута, офферы, типы создателя, типы ТС.

      **GET /v1/reference/cargo** — полный справочник для грузов. cargo_status (с description), route_point_type (load, unload, customs, transit), truck_type, shipment_type (FTL, LTL…), currency (USD, UZS…), prepayment_type (bank_transfer…), remaining_type (on_delivery…), loading_type (top, side…), offer_status, created_by_type, trip_status. Все переданные в API значения валидируются по этим справочникам.
  - name: "Reference / Company"
    description: |
      **Справочник для раздела Company.** Типы компании, статусы компании, роли (с id и описанием) для приглашений и назначений.

      **GET /v1/reference/company** возвращает: company_type (только SHIPPER, CARRIER, BROKER), company_status (ACTIVE, INACTIVE, BLOCKED, PENDING), company_user_roles (OWNER, CEO, TOP_MANAGER, TOP_DISPATCHER, DISPATCHER, MANAGER), roles — массив {id, name, description} из БД. Все value в верхнем регистре.
  - name: "Reference / Admin"
    description: |
      **Справочник для раздела Admin.** Статусы и типы админа.

      **GET /v1/reference/admin** возвращает (все value в верхнем регистре): admin_status (ACTIVE, INACTIVE, BLOCKED), admin_type (CREATOR, OPERATOR).
  - name: "Reference / Freelance Dispatchers"
    description: |
      **Справочник для раздела Freelance Dispatchers.** Статусы диспетчера.

      **GET /v1/reference/dispatchers** возвращает (все value в верхнем регистре): work_status (AVAILABLE, BUSY, OFFLINE).

      **GET /v1/reference/cities** — справочник всех городов мира (tidwall/cities + UZ/AE/TM/KG/TJ); in-memory, быстрый API; коды TAS, SAM, DXB и т.д.; query country_code — фильтр по стране.
  - name: "Cargo — Водитель"
    description: |
      **Запросы для водителя (мобильное приложение)**

      Водитель видит грузы, по которым ищут перевозчика, открывает карточку и отправляет оффер. JWT не обязателен для /api/cargo; в оффере передаётся carrier_id — ID водителя (из профиля/JWT).

      **Методы:** Список грузов (GET /api/cargo, фильтр status=searching) → карточка груза (GET /api/cargo/:id) → отправить оффер (POST /api/cargo/:id/offers). Опционально: список офферов по грузу (GET /api/cargo/:id/offers) — чтобы видеть свои офферы.
  - name: "Cargo — Диспетчер, компания, админ"
    description: |
      **Запросы для диспетчера, компании и админа**

      Создание грузов, редактирование, смена статусов, просмотр офферов, принятие оффера. Заголовки: X-Device-Type, X-Language, X-Client-Token (JWT не обязателен).

      **Методы:** Создать груз (POST /api/cargo) → список и карточка (GET) → редактировать (PUT), удалить (DELETE), сменить статус (PATCH .../status) → список офферов (GET .../offers) → принять оффер (POST /api/offers/:id/accept). Жизненный цикл: created → searching → assigned → in_transit → delivered; отмена из created/searching/assigned.
  - name: Chat
    description: |
      **Универсальный чат (driver ↔ dispatcher и др.)**
      **Кто вызывает:** Водитель, диспетчер или админ (JWT в X-User-Token). Для тестов в Swagger можно передать **X-User-ID** (UUID пользователя) вместо JWT.
      **Поток:** GET /v1/chat/conversations → POST /v1/chat/conversations (body peer_id) → GET/POST /v1/chat/conversations/:id/messages. PATCH/DELETE /v1/chat/messages/:id. Presence: GET /v1/chat/presence/:user_id. WebSocket: GET /v1/chat/ws?user_id=UUID или ?token=JWT.
  - name: Company Users
    description: |
      **Один auth API для пользователей компаний.** Все владельцы проходят верификацию номера телефона через OTP.
      **Поток:** 1) POST /v1/company-users/auth/phone (phone) → OTP отправлен. 2) POST /v1/company-users/auth/otp/verify (phone, otp) → при существующем пользователе status=login и tokens; при новом — status=register и session_id. 3) POST /v1/company-users/registration/complete (session_id, first_name, last_name опц., password) — создать пользователя; телефон из сессии, роль автоматически owner. В ответе — tokens и user (company_id, role). Таблица company_users (без email), поля company_id и role.
  - name: Company
    description: |
      **Компании по ТЗ.** Создание компаний (пользователь становится Owner), приглашения, роли, переключение компании. Вход/регистрация — через Company Users (OTP).
      **Заголовки:** X-Device-Type, X-Language, X-Client-Token. Для защищённых методов — X-User-Token (JWT после /v1/company-users/auth/otp/verify или /v1/company-users/registration/complete).

components:
  securitySchemes:
    DeviceTypeHeader:
      type: apiKey
      in: header
      name: X-Device-Type
      description: 'Обязателен для всех запросов. Допустимые значения: web, ios, android. Один раз выбранное значение действует для всех разделов (Drivers, Freelance Dispatchers, Admin, Cargo, Chat, Company).'
    LanguageHeader:
      type: apiKey
      in: header
      name: X-Language
      description: 'Обязателен для всех запросов. Допустимые значения: ru, uz, en, tr, zh. Один раз выбранное значение действует для всех разделов (любой язык в любом разделе).'
    ClientTokenHeader:
      type: apiKey
      in: header
      name: X-Client-Token
      description: Обязателен для всех API-запросов (включая Admin). Проверяется сервером на каждом запросе /v1/*.
    UserTokenHeader:
      type: apiKey
      in: header
      name: X-User-Token
      description: JWT access token. Для разделов Admin — обязательно JWT с role=admin (после /v1/admin/auth/login/password); сервер отклоняет запрос при другой роли или неверном токене.
    UserIDHeader:
      type: apiKey
      in: header
      name: X-User-ID
      description: 'Для теста чата в Swagger — UUID пользователя (водитель/диспетчер). Подставляется вместо JWT.'
  schemas:
    Envelope:
      type: object
      properties:
        status: { type: string, enum: ["success","error"] }
        code: { type: integer, example: 200 }
        description: { type: string, example: "ok" }
        data: { nullable: true }
      required: [status, code, description, data]
    Tokens:
      type: object
      description: |
        Во всех auth API: 1) время жизни (expires_in, refresh_expires_in — секунды);
        2) expires_at и refresh_expires_at — Unix timestamp в миллисекундах (ms). Расчёт везде по времени Ташкента (Asia/Tashkent). Для JS: new Date(expires_at).
      properties:
        access_token: { type: string, example: "eyJhbGciOi..." }
        refresh_token: { type: string, example: "eyJhbGciOi..." }
        expires_in: { type: integer, example: 900, description: "Время жизни access токена (секунды)" }
        expires_at: { type: integer, example: 1741600800000, description: "Unix ms — когда истекает access токен (когда обновить); JS: new Date(expires_at)" }
        refresh_expires_in: { type: integer, example: 604800, description: "Время жизни refresh токена (секунды)" }
        refresh_expires_at: { type: integer, example: 1742205600000, description: "Unix ms — когда истекает refresh токен; JS: new Date(refresh_expires_at)" }
      required: [access_token, refresh_token, expires_in, expires_at]
    Driver:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string, example: "+998331108810" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_online_at: { type: string, format: date-time, nullable: true }
        latitude: { type: number, format: double, nullable: true, example: 41.311081 }
        longitude: { type: number, format: double, nullable: true, example: 69.240562 }
        push_token: { type: string, nullable: true, example: "optional-device-token" }
        registration_step:
          type: string
          nullable: true
          enum: ["name-oferta", "geo-push", "transport-type"]
        registration_status:
          type: string
          nullable: true
          enum: ["start", "basic", "full"]
        name: { type: string, nullable: true, example: "Ali Valiyev" }
        driver_type:
          type: string
          nullable: true
          enum: ["company", "freelancer", "driver"]
        rating: { type: number, format: double, nullable: true }
        work_status:
          type: string
          nullable: true
          enum: ["available","loaded","busy"]
          example: "available"
        freelancer_id: { type: string, format: uuid, nullable: true }
        company_id: { type: string, format: uuid, nullable: true }
        account_status: { type: string, nullable: true }
        driver_passport_series: { type: string, nullable: true, example: "AB" }
        driver_passport_number: { type: string, nullable: true, example: "1234567" }
        driver_pinfl: { type: string, nullable: true, example: "12345678901234" }
        driver_scan_status: { type: boolean, nullable: true, example: true }
        power_plate_type: { type: string, nullable: true, example: "uz_private" }
        power_plate_number: { type: string, nullable: true, example: "01A123BC" }
        power_tech_series: { type: string, nullable: true }
        power_tech_number: { type: string, nullable: true }
        power_owner_id: { type: string, nullable: true, example: "12345678901234" }
        power_owner_name: { type: string, nullable: true, example: "Ali Valiyev" }
        power_scan_status: { type: boolean, nullable: true }
        trailer_plate_type: { type: string, nullable: true, example: "uz_private" }
        trailer_plate_number: { type: string, nullable: true }
        trailer_tech_series: { type: string, nullable: true }
        trailer_tech_number: { type: string, nullable: true }
        trailer_owner_id: { type: string, nullable: true, example: "12345678901234" }
        trailer_owner_name: { type: string, nullable: true, example: "Ali Valiyev" }
        trailer_scan_status: { type: boolean, nullable: true }
        driver_owner: { type: boolean, nullable: true, example: true }
        kyc_status: { type: string, nullable: true, example: "pending" }
      required: [id, phone, created_at, updated_at]
    Dispatcher:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true, example: "Dispetcher Name" }
        phone: { type: string, example: "+998331108810" }
        passport_series: { type: string, nullable: true, example: "AB" }
        passport_number: { type: string, nullable: true, example: "1234567" }
        pinfl: { type: string, nullable: true, example: "12345678901234" }
        cargo_id: { type: string, format: uuid, nullable: true }
        driver_id: { type: string, format: uuid, nullable: true }
        rating: { type: number, format: double, nullable: true }
        work_status: { type: string, nullable: true, example: "available" }
        status: { type: string, nullable: true, example: "active" }
        photo: { type: string, nullable: true, description: "Ссылка/путь (устаревшее); для загруженного фото см. has_photo" }
        has_photo: { type: boolean, description: "true если загружено фото в БД (получить через GET /v1/dispatchers/profile/photo)" }
        last_online_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
      required: [id, phone, created_at, updated_at]
    PowerPlateOption:
      type: object
      properties:
        code: { type: string, example: "TRUCK" }
        label: { type: string, example: "Грузовик + прицеп" }
      required: [code, label]
    TrailerPlateOption:
      type: object
      properties:
        code: { type: string, example: "FLATBED" }
        label: { type: string, example: "Бортовой прицеп" }
      required: [code, label]
    TransportOptionsResponse:
      type: object
      description: Списки power_plate_type и trailer_plate_type по типу базовой машины.
      properties:
        power_plate_types:
          type: array
          items:
            $ref: "#/components/schemas/PowerPlateOption"
        trailer_plate_types_by_power:
          type: object
          description: |
            Ключи — TRUCK, TRACTOR.
            TRUCK: FLATBED, TENTED, BOX, REEFER, TANKER, TIPPER, CAR_CARRIER.
            TRACTOR: FLATBED, TENTED, BOX, REEFER, TANKER, LOWBED, CONTAINER.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/TrailerPlateOption"
      required: [power_plate_types, trailer_plate_types_by_power]
    ItemWithLabel:
      type: object
      description: Элемент справочника (value — код для API, label — подпись для UI).
      properties:
        value: { type: string }
        label: { type: string }
    ItemWithLabelAndDescription:
      type: object
      description: Элемент справочника с пояснением (используется для cargo_status — описание, что означает каждый статус).
      properties:
        value: { type: string, description: "Код для API (например CREATED, SEARCHING)" }
        label: { type: string, description: "Краткая подпись для UI" }
        description: { type: string, description: "Подробное описание значения" }
    RoleRef:
      type: object
      description: Роль в компании (из app_roles).
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
    ReferenceDriversResponse:
      type: object
      properties:
        registration_step: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        registration_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        driver_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        work_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        power_plate_types: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        trailer_plate_types_by_power: { type: object, additionalProperties: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } } }
    ReferenceCargoResponse:
      type: object
      description: |
        Справочник для раздела Cargo. Все значения из справочника обязательны при валидации (POST/PUT /api/cargo).
        cargo_status — первый CREATED; route_point_type (load, unload, customs, transit); truck_type; shipment_type (FTL, LTL…);
        currency — для total_currency, prepayment_currency, remaining_currency; prepayment_type, remaining_type; loading_type — способы погрузки.
      properties:
        cargo_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabelAndDescription" } }
        route_point_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        offer_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        created_by_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        truck_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        trip_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        shipment_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Тип отправки: FTL, LTL, PACKAGE, OTHER" }
        currency: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Валюты для total_currency, prepayment_currency, remaining_currency: USD, UZS, EUR, RUB, KZT, AED, OTHER" }
        prepayment_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Способ предоплаты: bank_transfer, cash, card, invoice, other" }
        remaining_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Условия оплаты остатка: on_delivery, after_invoice, cash, deferred, other" }
        loading_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Способы погрузки: top, side, rear, crane, forklift, other" }
    ReferenceCompanyResponse:
      type: object
      properties:
        company_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Только SHIPPER, CARRIER, BROKER (верхний регистр)" }
        company_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "ACTIVE, INACTIVE, BLOCKED, PENDING" }
        company_user_roles: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" }, description: "Роли пользователей компании: OWNER, CEO, TOP_MANAGER, TOP_DISPATCHER, DISPATCHER, MANAGER" }
        roles: { type: array, items: { $ref: "#/components/schemas/RoleRef" }, description: "Роли из БД (id, name) для приглашений" }
    ReferenceAdminResponse:
      type: object
      properties:
        admin_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
        admin_type: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
    ReferenceDispatchersResponse:
      type: object
      properties:
        work_status: { type: array, items: { $ref: "#/components/schemas/ItemWithLabel" } }
    Cargo:
      type: object
      description: |
        **Груз (запись в таблице cargo).** Возвращается в списке грузов (GET /api/cargo) и в карточке груза (GET /api/cargo/:id).

        **Основные поля:** id — уникальный идентификатор; weight — вес в тоннах; volume — объём в м³; truck_type — тип кузова (tent, refrigerator, flatbed, tanker, other); status — жизненный цикл груза (created → searching → assigned → in_transit → delivered или cancelled).

        **Контакт:** contact_name, contact_phone — для связи с грузоотправителем/получателем.

        **Кто создал:** created_by_type (admin / dispatcher / company) и created_by_id заполняются автоматически при создании по JWT или company_id.
      properties:
        id: { type: string, format: uuid, description: "Уникальный идентификатор груза (UUID)" }
        weight: { type: number, description: "Вес груза в тоннах (обязательно > 0)" }
        volume: { type: number, description: "Объём груза в кубических метрах (м³)" }
        ready_enabled: { type: boolean, description: "Указана ли дата готовности груза к перевозке" }
        ready_at: { type: string, format: date-time, nullable: true, description: "Дата и время, когда груз будет готов к погрузке (обязательно при ready_enabled=true)" }
        load_comment: { type: string, nullable: true, description: "Комментарий к погрузке (особенности, условия)" }
        truck_type: { type: string, description: "Тип кузова: tent (тент), refrigerator (рефрижератор), flatbed (борт), tanker (цистерна), other (другое). Справочник: GET /v1/reference/cargo → truck_type" }
        temp_min: { type: number, nullable: true, description: "Минимальная температура (°C) для рефрижератора; допустимо только при truck_type=refrigerator" }
        temp_max: { type: number, nullable: true, description: "Максимальная температура (°C) для рефрижератора; допустимо только при truck_type=refrigerator" }
        adr_enabled: { type: boolean, description: "Является ли груз опасным (ADR); при true обязательно указать adr_class" }
        adr_class: { type: string, nullable: true, description: "Класс опасного груза (ADR); обязателен при adr_enabled=true" }
        loading_types: { type: array, items: { type: string }, description: "Способы погрузки (например верхняя, боковая)" }
        requirements: { type: array, items: { type: string }, description: "Дополнительные требования к перевозке" }
        shipment_type: { type: string, nullable: true, description: "Тип отправки: FTL (полная загрузка), LTL (частичная) и т.д." }
        belts_count: { type: integer, nullable: true, description: "Количество ремней крепления" }
        documents: { type: object, nullable: true, description: "Требуемые документы: TIR, T1, CMR, Medbook, GLONASS, Seal, Permit (булевы флаги)" }
        contact_name: { type: string, nullable: true, description: "Имя контактного лица (грузоотправитель/получатель)" }
        contact_phone: { type: string, nullable: true, description: "Телефон контактного лица в формате +998XXXXXXXXX" }
        status: { type: string, enum: [created, searching, assigned, in_transit, delivered, cancelled], description: "Статус: created — создан; searching — в поиске перевозчика; assigned — назначен; in_transit — в пути; delivered — доставлен; cancelled — отменён" }
        created_at: { type: string, format: date-time, description: "Дата и время создания записи" }
        updated_at: { type: string, format: date-time, description: "Дата и время последнего обновления" }
        created_by_type: { type: string, enum: [admin, dispatcher, company], nullable: true, description: "Кто создал груз: admin, dispatcher или company (подставляется автоматически по JWT или company_id)" }
        created_by_id: { type: string, format: uuid, nullable: true, description: "UUID создателя (админ, диспетчер или компания)" }
        company_id: { type: string, format: uuid, nullable: true, description: "UUID компании, от которой груз (если создан от имени компании)" }
    RoutePoint:
      type: object
      description: |
        **Точка маршрута** (погрузка, выгрузка, таможня, транзит). В каждой точке указывается город (код из справочника городов), точный адрес и координаты.

        **Типы:** load — погрузка; unload — выгрузка; customs — таможня; transit — транзитная точка. В маршруте обязательно минимум одна погрузка (load) и одна выгрузка (unload).

        **Город:** city_code берётся из GET /v1/reference/cities (например TAS — Ташкент, SAM — Самарканд, DXB — Дубай).
      properties:
        id: { type: string, format: uuid, description: "Уникальный идентификатор точки маршрута" }
        cargo_id: { type: string, format: uuid, description: "UUID груза, к которому относится точка" }
        type: { type: string, enum: [load, unload, customs, transit], description: "Тип точки: load — погрузка, unload — выгрузка, customs — таможня, transit — транзит" }
        city_code: { type: string, description: "Код города из справочника GET /v1/reference/cities (TAS, SAM, DXB и т.д.)" }
        address: { type: string, description: "Полный адрес: улица, дом, склад, промзона" }
        orientir: { type: string, description: "Ориентир для водителя: как найти место (въезд, КПП, рядом с чем)" }
        lat: { type: number, description: "Широта в градусах (для карты и навигации)" }
        lng: { type: number, description: "Долгота в градусах (для карты и навигации)" }
        comment: { type: string, nullable: true, description: "Произвольный комментарий к точке" }
        point_order: { type: integer, description: "Порядок точки в маршруте (1, 2, 3…)" }
        is_main_load: { type: boolean, description: "Является ли эта точка основной погрузкой" }
        is_main_unload: { type: boolean, description: "Является ли эта точка основной выгрузкой" }
    Payment:
      type: object
      description: |
        **Условия оплаты по грузу** (одна запись на груз). Указывается при создании/редактировании груза в блоке payment.

        **Сумма:** total_amount и total_currency — итоговая цена перевозки; если price_request=true, фиксированной суммы нет (запрос цены). is_negotiable — цена договорная.

        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток — remaining_amount, remaining_currency.
      properties:
        id: { type: string, format: uuid, description: "UUID записи об оплате" }
        cargo_id: { type: string, format: uuid, description: "UUID груза" }
        is_negotiable: { type: boolean, description: "Цена договорная (обсуждается с перевозчиком)" }
        price_request: { type: boolean, description: "Запрос цены: true — без фиксированной суммы, перевозчик предлагает сам" }
        total_amount: { type: number, nullable: true, description: "Общая сумма оплаты за перевозку" }
        total_currency: { type: string, nullable: true, description: "Валюта суммы: USD, UZS и т.д." }
        with_prepayment: { type: boolean, description: "Есть ли предоплата" }
        without_prepayment: { type: boolean, description: "Оплата без предоплаты (полный расчёт по факту)" }
        prepayment_amount: { type: number, nullable: true, description: "Сумма предоплаты" }
        prepayment_currency: { type: string, nullable: true, description: "Валюта предоплаты" }
        prepayment_type: { type: string, nullable: true, description: "Тип предоплаты (по договорённости)" }
        remaining_amount: { type: number, nullable: true, description: "Сумма остатка к оплате" }
        remaining_currency: { type: string, nullable: true, description: "Валюта остатка" }
        remaining_type: { type: string, nullable: true, description: "Условия оплаты остатка" }
    Offer:
      type: object
      description: |
        **Оффер (предложение перевозчика)** по грузу. Водитель отправляет цену и комментарий; диспетчер/админ принимает или отклоняет оффер.

        **Статусы:** pending — на рассмотрении; accepted — принят (груз переходит в assigned, создаётся рейс); rejected — отклонён. carrier_id — ID водителя из таблицы drivers.
      properties:
        id: { type: string, format: uuid, description: "UUID оффера" }
        cargo_id: { type: string, format: uuid, description: "UUID груза" }
        carrier_id: { type: string, format: uuid, description: "ID перевозчика (водителя из drivers)" }
        price: { type: number, description: "Предложенная цена" }
        currency: { type: string, description: "Валюта (USD, UZS и т.д.)" }
        comment: { type: string, nullable: true, description: "Комментарий перевозчика" }
        status: { type: string, enum: [pending, accepted, rejected], description: "pending — на рассмотрении, accepted — принят, rejected — отклонён" }
        created_at: { type: string, format: date-time, description: "Дата и время создания оффера" }
    CargoListResponse:
      type: object
      description: Ответ GET /api/cargo — список грузов и общее количество для пагинации.
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Cargo" }, description: Массив грузов на текущей странице }
        total: { type: integer, description: Общее число записей (без лимита страницы) }
      required: [items, total]
    CargoCreateRequest:
      type: object
      description: |
        **Тело запроса POST /api/cargo** — создание груза с точками маршрута и условиями оплаты.

        **Обязательные поля:** weight (вес в тоннах, > 0), volume (объём в м³, > 0), truck_type (тип кузова из справочника GET /v1/reference/cargo), route_points — массив точек маршрута. В route_points обязательно минимум одна точка с type=load (погрузка) и одна с type=unload (выгрузка). У каждой точки обязательны: type, city_code, address, lat, lng, point_order.

        **Справочники:** города — GET /v1/reference/cities (коды TAS, SAM, DXB…); типы кузова — GET /v1/reference/cargo → truck_type.

        **Создатель:** при заголовке X-User-Token (JWT админа или диспетчера) создатель подставляется автоматически; при отсутствии JWT можно передать company_id — тогда создателем будет компания.

        **Статус при создании:** всегда устанавливается автоматически в `created`. Чтобы перевести груз в поиск перевозчика, после создания вызовите PATCH /api/cargo/:id/status с телом { "status": "searching" }.
      properties:
        weight: { type: number, description: "Вес груза в тоннах; обязательно, число больше 0" }
        volume: { type: number, description: "Объём груза в кубических метрах (м³); обязательно, число больше 0" }
        ready_enabled: { type: boolean, default: false, description: "Указана ли дата готовности груза к погрузке" }
        ready_at: { type: string, format: date-time, nullable: true, description: "Дата и время готовности; обязательна, если ready_enabled=true" }
        load_comment: { type: string, nullable: true, description: "Комментарий к погрузке (условия, особенности)" }
        truck_type: { type: string, description: "Тип кузова: tent, refrigerator, flatbed, tanker, other (значения из GET /v1/reference/cargo → truck_type)" }
        temp_min: { type: number, nullable: true, description: "Минимальная температура (°C); допустимо только при truck_type=refrigerator" }
        temp_max: { type: number, nullable: true, description: "Максимальная температура (°C); допустимо только при truck_type=refrigerator" }
        adr_enabled: { type: boolean, default: false, description: "Опасный груз (ADR); при true обязательно указать adr_class" }
        adr_class: { type: string, nullable: true, description: "Класс опасного груза; обязателен при adr_enabled=true" }
        loading_types: { type: array, items: { type: string }, nullable: true, description: "Способы погрузки (массив строк)" }
        requirements: { type: array, items: { type: string }, nullable: true, description: "Дополнительные требования к перевозке" }
        shipment_type: { type: string, nullable: true, example: FTL, description: "Тип отправки: FTL (полная загрузка), LTL и т.д." }
        belts_count: { type: integer, nullable: true, description: "Количество ремней крепления" }
        documents: { type: object, nullable: true, description: "Требуемые документы: объект с полями TIR, T1, CMR, Medbook, GLONASS, Seal, Permit (boolean)" }
        contact_name: { type: string, nullable: true, description: "Имя контактного лица для связи" }
        contact_phone: { type: string, nullable: true, description: "Телефон контакта, например +998901234567" }
        company_id: { type: string, format: uuid, nullable: true, description: "UUID компании, от имени которой создаётся груз (опционально)" }
        route_points:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/RoutePointInput" }
          description: "Точки маршрута: минимум одна погрузка (load) и одна выгрузка (unload); порядок задаётся point_order"
        payment: { $ref: "#/components/schemas/PaymentInput", nullable: true, description: "Условия оплаты (опционально); при указании либо total_amount, либо price_request=true" }
      required: [weight, volume, truck_type, route_points]
    CargoUpdateRequest:
      type: object
      description: |
        **Тело PUT /api/cargo/:id** — частичное обновление груза. Все поля опциональны; передаются только те, что нужно изменить.
        Статус груза не передаётся в PUT — смена статуса через PATCH /api/cargo/:id/status.
      properties:
        weight: { type: number, description: "Вес (т); > 0" }
        volume: { type: number, description: "Объём (м³); > 0" }
        ready_enabled: { type: boolean }
        ready_at: { type: string, format: date-time, nullable: true }
        load_comment: { type: string, nullable: true }
        truck_type: { type: string }
        temp_min: { type: number, nullable: true }
        temp_max: { type: number, nullable: true }
        adr_enabled: { type: boolean }
        adr_class: { type: string, nullable: true }
        loading_types: { type: array, items: { type: string } }
        requirements: { type: array, items: { type: string } }
        shipment_type: { type: string, nullable: true }
        belts_count: { type: integer, nullable: true }
        documents: { type: object, nullable: true }
        contact_name: { type: string, nullable: true }
        contact_phone: { type: string, nullable: true }
        route_points: { type: array, items: { $ref: "#/components/schemas/RoutePointInput" } }
        payment: { $ref: "#/components/schemas/PaymentInput", nullable: true }
    RoutePointInput:
      type: object
      description: |
        **Одна точка маршрута** при создании или редактировании груза (POST /api/cargo, PUT /api/cargo/:id).

        **Обязательно:** type (load/unload/customs/transit), city_code (код города из GET /v1/reference/cities), address (улица, дом, склад), lat, lng (координаты), point_order (порядок 1, 2, 3…).

        **Опционально:** orientir — подсказка для водителя, как найти место; comment; is_main_load / is_main_unload — отметить основную погрузку/выгрузку.
      properties:
        type: { type: string, enum: [load, unload, customs, transit], description: "Тип точки: load — погрузка, unload — выгрузка, customs — таможня, transit — транзит" }
        city_code: { type: string, description: "Код города из справочника GET /v1/reference/cities (TAS — Ташкент, SAM — Самарканд, DXB — Дубай и т.д.)", example: "TAS" }
        address: { type: string, description: "Полный адрес: улица, дом, номер склада, промзона" }
        orientir: { type: string, description: "Ориентир для водителя: с какой стороны въезд, рядом с чем, КПП", example: "склад №5, въезд с ул. Мира" }
        lat: { type: number, description: "Широта в градусах (для карты)" }
        lng: { type: number, description: "Долгота в градусах (для карты)" }
        comment: { type: string, nullable: true, description: "Произвольный комментарий к точке" }
        point_order: { type: integer, description: "Порядок точки в маршруте (1 — первая, 2 — вторая и т.д.)" }
        is_main_load: { type: boolean, default: false, description: "Отметить как основную точку погрузки" }
        is_main_unload: { type: boolean, default: false, description: "Отметить как основную точку выгрузки" }
      required: [type, city_code, address, lat, lng, point_order]
    PaymentInput:
      type: object
      description: |
        **Условия оплаты** при создании или обновлении груза (блок payment в теле POST/PUT /api/cargo). Один блок на груз.

        **Правило:** если передан блок payment и price_request=false, нужно указать total_amount (фиксированная сумма). Если price_request=true — сумма не обязательна (запрос цены от перевозчика).

        **Предоплата:** with_prepayment, prepayment_amount, prepayment_currency; остаток к оплате — remaining_amount, remaining_currency.
      properties:
        is_negotiable: { type: boolean, default: false, description: "Цена договорная (обсуждается с перевозчиком)" }
        price_request: { type: boolean, default: false, description: "Запрос цены: true — без фиксированной суммы, перевозчик предлагает цену сам" }
        total_amount: { type: number, nullable: true, description: "Общая сумма оплаты за перевозку (обязательна при price_request=false)" }
        total_currency: { type: string, nullable: true, example: USD, description: "Валюта: USD, UZS и т.д." }
        with_prepayment: { type: boolean, default: false, description: "Есть предоплата" }
        without_prepayment: { type: boolean, default: true, description: "Оплата без предоплаты (расчёт по факту)" }
        prepayment_amount: { type: number, nullable: true, description: "Сумма предоплаты" }
        prepayment_currency: { type: string, nullable: true, description: "Валюта предоплаты" }
        prepayment_type: { type: string, nullable: true, description: "Тип/условия предоплаты" }
        remaining_amount: { type: number, nullable: true, description: "Сумма остатка к оплате после доставки" }
        remaining_currency: { type: string, nullable: true, description: "Валюта остатка" }
        remaining_type: { type: string, nullable: true, description: "Условия оплаты остатка" }
    CargoStatusRequest:
      type: object
      description: Тело PATCH /api/cargo/:id/status — смена статуса с проверкой допустимых переходов.
      properties:
        status: { type: string, enum: [created, searching, assigned, in_transit, delivered, cancelled], example: "searching" }
      required: [status]
    OfferCreateRequest:
      type: object
      description: Тело POST /api/cargo/:id/offers. Оффер от перевозчика (водителя); carrier_id — ID водителя из таблицы drivers.
      properties:
        carrier_id: { type: string, format: uuid, description: "ID перевозчика (водителя)", example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
        price: { type: number, description: "Предлагаемая цена", example: 1500 }
        currency: { type: string, example: "USD" }
        comment: { type: string, nullable: true, example: "Готов выехать завтра, своя тентовая фура" }
      required: [carrier_id, price, currency]
    CargoDetailResponse:
      type: object
      description: Ответ GET /api/cargo/:id — груз с вложенными route_points и payment.
      allOf:
        - $ref: "#/components/schemas/Cargo"
        - type: object
          properties:
            route_points: { type: array, items: { $ref: "#/components/schemas/RoutePoint" } }
            payment: { $ref: "#/components/schemas/Payment", nullable: true }

paths:
  /health:
    get:
      summary: Проверка работоспособности
      responses:
        "200":
          description: OK

  /api/cargo:
    post:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "1. Создать груз (добавление груза — фриланс-диспетчер)"
      description: |
        **Фриланс-диспетчер:** передайте X-User-Token (JWT после входа) — в груз запишется created_by_type=dispatcher.
        **Назначение:** Создание нового груза с точками маршрута и блоком оплаты.

        **Логика:** В одной транзакции создаются запись в `cargo`, записи в `route_points` (все переданные точки), одна запись в `payments` (если передан блок payment). Валидация: weight > 0; минимум одна точка с type=load и одна с type=unload; у каждой точки обязательны city_code (код города из справочника городов), address, lat, lng, point_order; опционально orientir. Справочник городов: GET /v1/reference/cities (все города мира, коды TAS/SAM/DXB и т.д.). Если указаны temp_min/temp_max — truck_type должен быть refrigerator; если adr_enabled=true — обязателен adr_class; если ready_enabled=true — обязателен ready_at.

        **Создатель (автоматически):** Если передан заголовок **X-User-Token** (JWT) с ролью admin или dispatcher — в груз записываются created_by_type и created_by_id. Если JWT не передан, но в теле есть company_id — создателем считается компания (created_by_type=company). Опционально в теле можно передать company_id для привязки груза к компании.

        **Что передаём:** Схема CargoCreateRequest — все поля груза (обязательные: weight, volume, truck_type, route_points) + опционально payment, contact_name, contact_phone, ready_enabled, ready_at, load_comment, temp_min/temp_max, adr_enabled, adr_class, loading_types, requirements, shipment_type, belts_count, documents, company_id. В ответе возвращается **полный объект груза** (как в GET /api/cargo/:id): data содержит созданный груз с id, route_points, payment и всеми полями.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CargoCreateRequest" }
            description: "Реальный пример груза — пшеница, Ташкент → Самарканд, тент 20т/82м³, с оплатой и документами."
            example:
              weight: 20
              volume: 82
              truck_type: "tent"
              ready_enabled: true
              ready_at: "2026-03-15T08:00:00Z"
              load_comment: "Погрузка сверху, склад сухой. Груз пшеница, мешки 50 кг."
              adr_enabled: false
              loading_types: ["top", "side"]
              requirements: ["Тент в хорошем состоянии", "Крепление ремнями"]
              shipment_type: "FTL"
              belts_count: 6
              documents:
                TIR: true
                CMR: true
                Seal: true
              contact_name: "Иван Петров"
              contact_phone: "+998901234567"
              route_points:
                - type: "load"
                  city_code: "TAS"
                  address: "ул. Амира Темура 1, склад №5"
                  orientir: "Въезд со стороны метро Хамза, ворота А"
                  lat: 41.311081
                  lng: 69.240562
                  comment: "Склад зерна, разгрузка с 08:00 до 18:00"
                  point_order: 1
                  is_main_load: true
                  is_main_unload: false
                - type: "unload"
                  city_code: "SAM"
                  address: "промзона Южная, терминал А"
                  orientir: "За КПП 2, склад напротив"
                  lat: 39.654167
                  lng: 66.959722
                  comment: "Выгрузка в течение 2 часов по прибытии"
                  point_order: 2
                  is_main_load: false
                  is_main_unload: true
              payment:
                is_negotiable: false
                price_request: false
                total_amount: 1500
                total_currency: "USD"
                with_prepayment: true
                without_prepayment: false
                prepayment_amount: 500
                prepayment_currency: "USD"
                prepayment_type: "bank_transfer"
                remaining_amount: 1000
                remaining_currency: "USD"
                remaining_type: "on_delivery"
      responses:
        "201":
          description: "Груз создан. В data — полный объект груза (id, route_points, payment и все поля)."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CargoDetailResponse", description: "Полный объект созданного груза (как в GET /api/cargo/:id) — id, weight, volume, route_points, payment и все остальные поля" }
        "400":
          description: "Ошибка валидации (неверные поля, нет load/unload точек и т.д.)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Водитель", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "2. Список грузов (фильтры, пагинация)"
      description: |
        **Кто вызывает:** Водитель (чаще всего с status=searching), диспетчер, компания, админ.
        **Назначение:** Получение списка грузов. Водитель вызывает с фильтром status=searching, чтобы видеть грузы, по которым ищут перевозчика.

        **Логика:** Удалённые (soft delete) не возвращаются. Применяются фильтры по query-параметрам. Сортировка по sort (например created_at:desc). Пагинация: page (с 1), limit (по умолчанию 20, макс. 100). В ответе data.items — массив грузов, data.total — общее количество записей.

        **Параметры:** status (несколько через запятую), weight_min, weight_max, truck_type, created_from (YYYY-MM-DD), created_to, with_offers (true — только грузы с офферами), page, limit, sort.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, example: "searching" }
          description: "Статусы через запятую (created, searching, assigned, in_transit, delivered, cancelled). Для теста: searching"
        - name: weight_min
          in: query
          schema: { type: number, example: 10 }
          description: "Минимальный вес (т)"
        - name: weight_max
          in: query
          schema: { type: number, example: 25 }
          description: "Максимальный вес (т)"
        - name: truck_type
          in: query
          schema: { type: string, example: "tent" }
          description: "Тип транспорта (tent, refrigerator, flatbed, tanker, other)"
        - name: created_from
          in: query
          schema: { type: string, format: date }
          description: "Дата создания от (YYYY-MM-DD)"
        - name: created_to
          in: query
          schema: { type: string, format: date }
          description: "Дата создания до (YYYY-MM-DD)"
        - name: with_offers
          in: query
          schema: { type: boolean }
          description: "true — только грузы, у которых есть хотя бы один оффер"
        - name: page
          in: query
          schema: { type: integer, default: 1, example: 1 }
          description: "Номер страницы (с 1)"
        - name: limit
          in: query
          schema: { type: integer, default: 20, example: 20 }
          description: "Записей на странице (макс. 100)"
        - name: sort
          in: query
          schema: { type: string, example: "created_at:desc" }
          description: "Сортировка (поле:направление), например created_at:desc, weight:asc"
      responses:
        "200":
          description: "data = { items: Cargo[], total: number }"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CargoListResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/cargo/{id}:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Водитель", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "3. Получить груз по ID (карточка)"
      description: |
        **Кто вызывает:** Водитель (перед отправкой оффера), диспетчер, компания, админ.
        **Назначение:** Детальная карточка груза с точками маршрута и блоком оплаты.

        **Логика:** По id возвращается одна запись из cargo; к ней подгружаются все route_points (по point_order) и одна запись payment (если есть). Удалённые грузы не возвращаются (404).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
      responses:
        "200":
          description: "data содержит груз + route_points + payment"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CargoDetailResponse" }
        "404":
          description: "Груз не найден или удалён"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    put:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "4. Обновить груз"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ. Водитель не редактирует грузы.
        **Назначение:** Редактирование груза (поля груза, точки маршрута, оплата).

        **Логика:** Передаются только те поля, которые нужно изменить (частичное обновление). После перехода в статус assigned (и далее) менять маршрут и оплату нельзя — запрос вернёт 400. Можно менять контакт/комментарии. Если переданы route_points — старые точки заменяются на новый набор (при условии что статус ещё не assigned/in_transit/delivered).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CargoUpdateRequest" }
      responses:
        "200":
          description: "Обновление применено. data.id = id груза."
        "400":
          description: "Валидация не прошла или нельзя редактировать после assigned"
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "5. Удалить груз (soft delete)"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ.
        **Назначение:** Мягкое удаление груза (deleted_at). В списках и по ID такой груз больше не возвращается.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      responses:
        "200":
          description: "Груз помечен удалённым"
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/cargo/{id}/status:
    patch:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "6. Изменить статус груза"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ. Водитель статусы груза не меняет.
        **Назначение:** Смена статуса с проверкой допустимых переходов.

        **Допустимые переходы:** created → searching | cancelled; searching → assigned | cancelled; assigned → in_transit | cancelled; in_transit → delivered; delivered и cancelled — конечные. Любой другой переход вернёт 400.

        **Тело запроса:** Один объект с полем status (значение из enum).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CargoStatusRequest" }
            example:
              status: "searching"
      responses:
        "200":
          description: "Статус обновлён"
        "400":
          description: "Переход недопустим (например delivered → searching)"
  /api/cargo/{id}/offers:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Водитель", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "7. Список офферов по грузу"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ (перед принятием оффера). Водитель может смотреть свои офферы через список грузов или отдельный экран.
        **Назначение:** Просмотр всех офферов по конкретному грузу.

        **Логика:** Возвращаются все записи из offers с cargo_id = id, отсортированные по created_at (новые сверху). В каждом оффере: id, cargo_id, carrier_id (ID водителя), price, currency, comment, status (pending/accepted/rejected), created_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
      responses:
        "200":
          description: "data.items — массив офферов"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items: { type: array, items: { $ref: "#/components/schemas/Offer" } }
    post:
      tags: ["Cargo — Водитель"]
      summary: "8. Создать оффер (от перевозчика)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Диспетчер/компания офферы не создают от своего имени.
        **Назначение:** Перевозчик отправляет предложение по грузу: цена, валюта, комментарий. Вызывается после выбора груза из списка (GET /api/cargo?status=searching). В теле carrier_id — ID водителя (из JWT/профиля).

        **Логика:** Создаётся запись в offers с status=pending. carrier_id — это ID водителя из таблицы drivers (рекомендуется подставлять из JWT водителя на бэкенде/клиенте). В ответе data.id — UUID созданного оффера.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
          description: "UUID груза"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfferCreateRequest" }
            example:
              carrier_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              price: 1500
              currency: "USD"
              comment: "Готов выехать завтра, своя тентовая фура"
      responses:
        "201":
          description: "Оффер создан. data.id — UUID оффера."
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/offers/{id}/accept:
    post:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher"]
      summary: "9. Принять оффер"
      description: |
        **Кто вызывает:** Диспетчер, компания, админ. Водитель офферы не принимает.
        **Назначение:** Принять выбранный оффер. Статус груза → assigned, у принятого оффера status=accepted, остальные офферы по этому грузу → rejected.

        **Логика:** id в path — это ID оффера. Проверяется, что оффер существует и имеет status=pending. После принятия груз привязан к перевозчику (carrier_id принятого оффера).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "e5f6a7b8-c9d0-1234-ef56-789012345678" }
          description: "UUID оффера"
      responses:
        "200":
          description: "data: cargo_id, offer_id, status=accepted"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cargo_id: { type: string, format: uuid }
                          offer_id: { type: string, format: uuid }
                          trip_id: { type: string, format: uuid, description: "Созданный рейс (pending_driver)" }
                          status: { type: string, example: "accepted" }
        "400":
          description: "Оффер не найден или уже не pending"

  /api/trips:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher", "Cargo — Водитель"]
      summary: "Список рейсов по грузу"
      description: "Query cargo_id (обязателен) — возвращает рейс по этому грузу. Базовые заголовки."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: cargo_id
          in: query
          required: true
          schema: { type: string, format: uuid, example: "b2c3d4e5-f6a7-8901-bcde-f12345678901" }
      responses:
        "200":
          description: items — массив рейсов (id, cargo_id, offer_id, driver_id, status, created_at, updated_at)
  /api/trips/{id}:
    get:
      tags: ["Freelance Dispatchers / Добавление груза", "Cargo — Диспетчер, компания, админ", "Cargo — Freelance dispatcher", "Cargo — Водитель"]
      summary: "Рейс по ID"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Рейс (id, cargo_id, offer_id, driver_id, status) }
