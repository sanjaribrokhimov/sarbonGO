          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token.
        **Назначение:** Жёсткое удаление аккаунта: запись переносится в deleted_drivers, из drivers удаляется.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "404":
          description: Профиль не найден
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/driver:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные водителя (имя, статус, паспорт)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Частичное обновление: name, work_status (available/loaded/busy), driver_passport_series, driver_passport_number, driver_pinfl. Остальные поля не меняются.
        **Данные:** В теле только те поля, которые нужно изменить.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "Ali Valiyev" }
                work_status:
                  type: string
                  enum: ["available","loaded","busy"]
                  example: "available"
                driver_passport_series: { type: string, example: "AB" }
                driver_passport_number: { type: string, example: "1234567" }
                driver_pinfl: { type: string, example: "12345678901234" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/heartbeat:
    put:
      tags: ["Drivers / Profile"]
      summary: "Обновить гео и время последней активности"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление координат (и при необходимости last_online_at) в профиле водителя.
        **Данные:** только latitude и longitude. last_online_at в API не передаётся — обновляется на сервере автоматически (в т.ч. при каждом запросе водителя).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
              required: ["latitude","longitude"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/phone-change/request:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — запрос OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Запрос OTP на новый номер. Если номер уже занят — ошибка. Иначе OTP отправлен, возвращается session_id для шага verify.
        **Данные:** new_phone (обязательно, формат +998XXXXXXXXX).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: ["new_phone"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Некорректный new_phone; или no account — у номера нет аккаунта Telegram }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/profile/phone-change/verify:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — подтверждение OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Подтверждение смены телефона. Передаёте session_id из request и otp. При успехе обновляется drivers.phone; при ошибке — сообщение об ошибке.
        **Данные:** session_id, otp (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: ["session_id","otp"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/power:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные тягача (Power Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей тягача: power_plate_number, power_tech_series, power_tech_number, power_owner_id, power_owner_name, power_scan_status.
        **Данные:** В теле только изменяемые поля тягача.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_number: { type: string, example: "01A123BC" }
                power_tech_series: { type: string, example: "AA" }
                power_tech_number: { type: string, example: "9876543" }
                power_owner_id: { type: string, example: "12345678901234" }
                power_owner_name: { type: string, example: "Ali Valiyev" }
                power_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/trailer:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные прицепа (Trailer Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей прицепа: trailer_plate_number, trailer_tech_series, trailer_tech_number, trailer_owner_id, trailer_owner_name, trailer_scan_status.
        **Данные:** В теле только изменяемые поля прицепа.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_number: { type: string, example: "01A123BC" }
                trailer_tech_series: { type: string, example: "AA" }
                trailer_tech_number: { type: string, example: "9876543" }
                trailer_owner_id: { type: string, example: "12345678901234" }
                trailer_owner_name: { type: string, example: "Ali Valiyev" }
                trailer_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/registration/geo-push:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 4. Указать гео и push-токен"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** При передаче latitude и longitude — registration_step переводится в geo-push (если ещё не transport-type). push_token сохраняется в любом случае. Без гео шаг не меняется.
        **Данные:** latitude, longitude (опц.), push_token (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
                push_token: { type: string, example: "optional-device-token" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/registration/transport-type:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 5. Выбрать тип транспорта"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Указание типа водителя и ТС. После успешного запроса: registration_step=transport-type, registration_status=basic. Справочники кодов: GET /v1/transport-options.
        **Данные:** driver_type (company/freelancer/driver), power_plate_type, trailer_plate_type (обязательно); freelancer_id, company_id (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_type:
                  type: string
                  enum: ["company","freelancer","driver"]
                  example: "driver"
                power_plate_type:
                  type: string
                  example: "uz_private"
                trailer_plate_type:
                  type: string
                  example: "uz_private"
                freelancer_id: { type: string, format: uuid, nullable: true }
                company_id: { type: string, format: uuid, nullable: true }
              required: ["driver_type","power_plate_type","trailer_plate_type"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]

  /v1/kyc:
    patch:
      tags: ["Drivers / KYC"]
      summary: "Отправить KYC (паспорт, ТС, прицеп)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Загрузка документов: driver_data (паспорт, PINFL, driver_scan_status), power_data (тягач: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп — то же или не указывать), driver_owner (true/false). registration_status=full выставляется только при полном и подтверждённом заполнении (scan_status=true где нужно).
        **Данные:** driver_owner, driver_data, power_data, trailer_data (все блоки обязательны).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner: { type: boolean, example: true }
                driver_data:
                  type: object
                  properties:
                    driver_passport_series: { type: string, example: "AB" }
                    driver_passport_number: { type: string, example: "1234567" }
                    driver_pinfl: { type: string, example: "12345678901234" }
                    driver_scan_status: { type: boolean, example: true }
                  required: ["driver_passport_series","driver_passport_number","driver_pinfl","driver_scan_status"]
                power_data:
                  type: object
                  properties:
                    power_plate_number: { type: string, example: "01A123BC" }
                    power_tech_series: { type: string, example: "AA" }
                    power_tech_number: { type: string, example: "9876543" }
                    power_owner_id: { type: string, example: "12345678901234" }
                    power_owner_name: { type: string, example: "Ali Valiyev" }
                    power_scan_status: { type: boolean, example: true }
                  required: ["power_plate_number","power_tech_series","power_tech_number","power_owner_id","power_owner_name","power_scan_status"]
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number: { type: string, example: "01A123BC" }
                    trailer_tech_series: { type: string, example: "AA" }
                    trailer_tech_number: { type: string, example: "9876543" }
                    trailer_owner_id: { type: string, example: "12345678901234" }
                    trailer_owner_name: { type: string, example: "Ali Valiyev" }
                    trailer_scan_status: { type: boolean, example: true }
                  required: ["trailer_plate_number","trailer_tech_series","trailer_tech_number","trailer_owner_id","trailer_owner_name","trailer_scan_status"]
              required:
                - driver_owner
                - driver_data
                - power_data
                - trailer_data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  is_full: { type: boolean, example: true }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, is_full, driver]

  /v1/auth/refresh:
    post:
      tags: ["Drivers / Auth"]
      summary: "Обновить JWT токены (водитель)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение) при истёкшем или скоро истекающем access_token.
        **Назначение:** По refresh_token выдать новую пару access_token + refresh_token. В ответе tokens с expires_in, expires_at, refresh_expires_at (Unix).
        **Тело:** { "refresh_token": "..." }. После вызова старый refresh_token недействителен (rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/dispatchers/auth/refresh:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Обновить JWT токены (диспетчер)"
      description: |
        **Кто вызывает:** Диспетчер при истёкшем/скоро истекающем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens (access_token, refresh_token, expires_in, expires_at, refresh_expires_at).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/admin/auth/refresh:
    post:
      tags: ["Admin / Auth"]
      summary: "Обновить JWT токены (админ)"
      description: |
        **Кто вызывает:** Админ при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/company-users/auth/refresh:
    post:
      tags: ["Company / App user auth"]
      summary: "Обновить JWT токены (пользователь компании)"
      description: |
        **Кто вызывает:** Пользователь компании (app user) при истёкшем access_token.
        **Тело:** { "refresh_token": "..." }. В ответе — tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401":
          description: invalid refresh_token

  /v1/auth/logout:
    post:
      tags: ["Drivers / Auth"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия (этот refresh больше нельзя использовать). Передайте **access_token** — отзываются все сессии водителя. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий водителя" }
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                required: [status]
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован }

  /v1/dispatchers/auth/phone:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Поток:** Ввод телефона в формате +998XXXXXXXXX → запрос отправляет OTP через Telegram Gateway. Код приходит в Telegram/смс. Используется и для входа (существующий диспетчер), и для регистрации (новый номер). Ответ: status=otp_sent, ttl_seconds.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
        "400": { description: Некорректный payload; или no account — у номера нет аккаунта Telegram }
        "429": { description: Cooldown / rate limit }
        "502": { description: OTP не отправлен (otp send failed) }

  /v1/dispatchers/auth/otp/verify:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Поток:** Передаёте phone и otp (код из шага 1). Если диспетчер уже зарегистрирован → в ответе status=login и tokens (access_token, refresh_token) — вход выполнен. Если телефон новый → status=register и session_id — переходите к регистрации (POST /v1/dispatchers/registration/complete), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
            example:
              phone: "+998901234567"
              otp: "123456"
      responses:
        "200":
          description: login (tokens) или register (session_id)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
        "401": { description: OTP неверный/истёк }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/login/password:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Вход по паролю (без OTP)"
      description: |
        **Поток:** Для уже зарегистрированного диспетчера. Передаёте phone и password → в ответе tokens. Дальше все запросы к профилю и т.д. с заголовком X-User-Token = access_token.
        **Данные:** phone, password (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                password: { type: string, example: "TestPass123!" }
              required: [phone, password]
            example:
              phone: "+998901234567"
              password: "TestPass123!"
      responses:
        "200":
          description: OK, tokens в data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "login" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401": { description: Неверный телефон или пароль }

  /v1/dispatchers/auth/reset-password/request:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Запросить OTP для сброса пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998901234567"
      responses:
        "200":
          description: OTP отправлен, session_id для confirm
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "404": { description: Диспетчер не найден }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Подтвердить сброс пароля (session_id + otp + new_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
                new_password: { type: string }
              required: [session_id, otp, new_password]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              otp: "123456"
              new_password: "NewPass456!"
      responses:
        "200":
          description: Пароль обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Сессия/OTP неверны }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/logout:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Выход (отзыв сессии)"
      description: |
        **Кто вызывает:** Freelance-диспетчер (клиент после входа по OTP или по паролю).
        **Назначение:** Инвалидация сессии. Передайте **refresh_token** — отзывается одна сессия. Передайте **access_token** — отзываются все сессии диспетчера. Нужен хотя бы один из токенов.
        **Валидация:** при невалидном или истёкшем токене возвращается 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string, description: "JWT refresh — отзыв одной сессии" }
                access_token: { type: string, description: "JWT access — отзыв всех сессий диспетчера" }
            example:
              access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: OK (сессия/сессии инвалидированы)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "400": { description: Нет ни refresh_token, ни access_token }
        "401": { description: Невалидный или истёкший токен; refresh уже использован; роль не dispatcher }

  /v1/dispatchers/registration/complete:
    post:
      tags: ["Freelance Dispatchers / Registration"]
      summary: "Шаг 3. Завершить регистрацию (имя, пароль, паспорт)"
      description: |
        **Поток:** Вызывается после otp/verify, когда получен status=register и session_id. В теле передаёте session_id (обязательно), name, password, passport_series, passport_number, pinfl (все обязательны). Создаётся запись в freelance_dispatchers, в ответе — tokens и объект dispatcher. После этого диспетчер может входить по phone+password или по OTP. Фото загружается отдельно через POST /v1/dispatchers/profile/photo.
        **Данные:** session_id, name, password, passport_series, passport_number, pinfl.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { type: string, example: "Dispetcher Name" }
                password: { type: string }
                passport_series: { type: string, example: "AB" }
                passport_number: { type: string, example: "1234567" }
                pinfl: { type: string, example: "12345678901234" }
              required: [session_id, name, password, passport_series, passport_number, pinfl]
            example:
              session_id: "d4e5f6a7-b8c9-0123-def0-234567890123"
              name: "Алексей Диспетчеров"
              password: "SecurePass123!"
              passport_series: "AB"
              passport_number: "1234567"
              pinfl: "31234567890123"
      responses:
        "200":
          description: Зарегистрирован или логин (если телефон уже был)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: session_id неверный/истёк }
        "409": { description: Телефон уже зарегистрирован }

  /v1/dispatchers/profile:
    get:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Получить профиль диспетчера"
      description: |
        **Поток:** Запрос с заголовком X-User-Token (JWT access_token). В ответе data.dispatcher — объект диспетчера (id, name, phone, паспорт, pinfl, work_status, rating и т.д.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK, data.dispatcher
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    patch:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Редактировать профиль диспетчера
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                passport_series: { type: string }
                passport_number: { type: string }
                pinfl: { type: string }
                photo: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    delete:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Удалить профиль диспетчера (архивация)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
        "404": { description: Диспетчер не найден }

  /v1/dispatchers/profile/photo:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Загрузить фото диспетчера"
      description: |
        **Формат:** multipart/form-data, поле **photo** — файл изображения (image/jpeg или image/png). Макс. размер 5 MB.
        Фото сохраняется в БД. В профиле (GET /profile) поле has_photo будет true; само изображение отдаётся через GET /v1/dispatchers/profile/photo.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Файл изображения (JPEG или PNG, макс. 5 MB)"
      responses:
        "200":
          description: Фото сохранено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "ok" }
                      event: { type: string, example: "photo_uploaded" }
        "400": { description: "Нет файла, неверный тип или размер" }
        "401": { description: Не авторизован }
    get:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Получить фото диспетчера"
      description: |
        Возвращает загруженное фото (бинарные данные) с заголовком Content-Type (image/jpeg или image/png).
        Если фото не загружалось — 404.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: Изображение
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        "401": { description: Не авторизован }
        "404": { description: Фото не найдено }

  /v1/dispatchers/profile/password:
    put:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Сменить пароль (текущий + новый)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string }
              required: [current_password, new_password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Неверный current_password }

  /v1/dispatchers/profile/phone-change/request:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — запрос OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: [new_phone]
      responses:
        "200":
          description: OTP отправлен, session_id для verify
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "400": { description: no account — у номера нет аккаунта Telegram }
        "409": { description: Телефон уже зарегистрирован }
        "502": { description: otp send failed — OTP не отправлен }

  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — подтверждение OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: [session_id, otp]
      responses:
        "200":
          description: Телефон обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: Сессия/OTP неверны }
        "409": { description: Телефон уже занят }

  /v1/dispatchers/companies:
    get:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Список моих компаний"
      description: "Компании, где диспетчер приглашён (диспетчер не создаёт компанию). Требуется X-User-Token."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "data.items — массив объектов с полями id, name, type, role" }

  /v1/dispatchers/auth/switch-company:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Переключить контекст на компанию"
      description: "Тело: company_id (UUID). В ответе — access_token, refresh_token, expires_in, expires_at (Unix), refresh_expires_in, refresh_expires_at (Unix)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_id: { type: string, format: uuid }
              required: [company_id]
      responses:
        "200": { description: "access_token, refresh_token, expires_in, expires_at, refresh_expires_in, refresh_expires_at (все даты — Unix)" }
        "403": { description: company not found or access denied }

  /v1/dispatchers/companies/{companyId}/invitations:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Пригласить диспетчера в компанию (по телефону)"
      description: "Тело: phone, role (dispatcher | top_dispatcher). Требуется доступ к компании. В ответе — token для accept."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
                role: { type: string, enum: [dispatcher, top_dispatcher] }
              required: [phone, role]
      responses:
        "201": { description: data.token, data.expires_in_hours }
        "403": { description: access denied }

  /v1/dispatchers/invitations/accept:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Принять приглашение в компанию"
      description: "Тело: token. Телефон диспетчера должен совпадать с приглашением. Требуется X-User-Token (dispatcher)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.company_id }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/dispatchers/invitations/decline:
    post:
      tags: ["Company / Dispatcher (приглашённый)"]
      summary: "Отклонить приглашение"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: declined }

  /v1/dispatchers/driver-invitations:
    post:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Отправить приглашение водителю (фриланс — без компании)"
      description: |
        **Фриланс-диспетчер:** пригласить водителя. Передайте **phone** (номер телефона) **или** **driver_id** (UUID водителя из поиска GET /v1/dispatchers/drivers/find). Достаточно одного из полей. В ответе — token; передать водителю (чат/ссылка). Водитель: GET /v1/driver-invitations → список; POST /v1/driver-invitations/accept (token) или POST .../decline (token). После принятия у водителя freelancer_id = текущий диспетчер. X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567", description: "Номер телефона водителя (если не указан driver_id)" }
                driver_id: { type: string, format: uuid, description: "UUID водителя из поиска GET .../drivers/find (приглашение по id)" }
            example:
              phone: "+998901234567"
            examples:
              by_phone:
                summary: "По номеру телефона"
                value: { phone: "+998901234567" }
              by_driver_id:
                summary: "По ID водителя (после поиска)"
                value: { driver_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
      responses:
        "201": { description: "data.token, data.expires_in_hours" }
        "400": { description: "invalid payload или phone/driver_id обязателен; driver not found при driver_id" }

  /v1/dispatchers/drivers/find:
    get:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Поиск водителей по номеру телефона"
      description: |
        **Диспетчер:** поиск водителей по части номера (phone). Совпадения по полному номеру выше. Результат — список водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); использовать id для приглашения через POST /v1/dispatchers/driver-invitations (body driver_id). X-User-Token (dispatcher).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: phone
          in: query
          required: true
          schema: { type: string, example: "+998901234567" }
          description: "Часть или полный номер телефона для поиска"
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: "data.items — массив водителей (id, phone, name, work_status, driver_type, freelancer_id, company_id); точные совпадения сверху"

  /v1/dispatchers/drivers:
    get:
      tags: ["Freelance Dispatchers / Приглашения водителей", "Freelance Dispatchers / My drivers"]
      summary: "Список моих водителей"
      description: "Водители, привязанные к фриланс-диспетчеру (freelancer_id = me). Query limit (default 100). X-User-Token (dispatcher)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100, example: 20 }
      responses:
        "200": { description: "data.items — массив водителей" }

  /v1/dispatchers/companies/{companyId}/driver-invitations:
    post:
      tags: ["Freelance Dispatchers / My drivers"]
      summary: "Пригласить водителя в компанию (по телефону)"
      description: "Тело: phone. В ответе — token. Водитель принимает через POST /v1/driver-invitations/accept."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid, example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998901234567" }
              required: [phone]
            example:
              phone: "+998971234567"
      responses:
        "201": { description: data.token, data.expires_in_hours }
        "403": { description: access denied }

  /v1/dispatchers/trips/{id}/assign-driver:
    patch:
      tags: ["Freelance Dispatchers / Trips"]
      summary: "Назначить водителя на рейс"
      description: "Тело: driver_id (UUID). Рейс должен быть в статусе pending_driver. Водитель подтверждает через POST /v1/trips/:id/confirm."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid, example: "f6a7b8c9-d0e1-2345-f678-901234567890" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id: { type: string, format: uuid }
              required: [driver_id]
            example:
              driver_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
      responses:
        "200": { description: status pending_driver, driver_id }
        "404": { description: trip not found or not pending_driver }

  /v1/trips:
    get:
      tags: ["Drivers / Trips"]
      summary: "Список моих рейсов"
      description: "Рейсы, назначенные текущему водителю. Требуется X-User-Token (driver). Опционально limit."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: data.items — массив рейсов }

  /v1/trips/{id}/confirm:
    post:
      tags: ["Drivers / Trips"]
      summary: "Принять назначение на рейс"
      description: "Водитель подтверждает рейс; статус рейса → assigned. Рейс должен быть назначен этому водителю (driver_id = me)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: status assigned }
        "404": { description: trip not found or not assigned to you }

  /v1/trips/{id}/reject:
    post:
      tags: ["Drivers / Trips"]
      summary: "Отклонить назначение на рейс"
      description: "Снимает водителя с рейса; диспетчер может назначить другого."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: status pending_driver }
        "404": { description: trip not found }

  /v1/trips/{id}/status:
    patch:
      tags: ["Drivers / Trips"]
      summary: "Сменить статус рейса (водитель)"
      description: "Тело: status (loading | en_route | unloading | completed | cancelled). Допустимые переходы по ТЗ."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [loading, en_route, unloading, completed, cancelled] }
              required: [status]
      responses:
        "200": { description: status }
        "400": { description: invalid status transition }
        "403": { description: trip not assigned to you }

  /v1/driver-invitations:
    get:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Список приглашений для водителя"
      description: |
        **Водитель:** приглашения на свой номер телефона (от компании или от фриланс-диспетчера). Показывать в чате/разделе приглашений. По каждому приглашению водитель может принять (POST .../accept) или отказаться (POST .../decline).
        В ответе data.items — массив: token, type (company | freelance), company_id или dispatcher_id, expires_at, created_at.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: "data.items — приглашения (token, type, company_id/dispatcher_id, expires_at, created_at)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            token: { type: string }
                            type: { type: string, enum: [company, freelance, unknown] }
                            company_id: { type: string, format: uuid }
                            dispatcher_id: { type: string, format: uuid }
                            phone: { type: string }
                            expires_at: { type: string, format: date-time }
                            created_at: { type: string, format: date-time }
  /v1/driver-invitations/accept:
    post:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Принять приглашение (водитель)"
      description: |
        Тело: token. Телефон водителя должен совпадать с приглашением.
        **От компании:** после принятия у водителя устанавливается company_id. **От фриланс-диспетчера:** у водителя устанавливается freelancer_id = id диспетчера; у диспетчера в списке GET /v1/dispatchers/drivers появляется этот водитель.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
            example:
              token: "a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789"
      responses:
        "200": { description: "data.company_id или data.freelancer_id" }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }
  /v1/driver-invitations/decline:
    post:
      tags: ["Drivers / Driver invitations", "Freelance Dispatchers / Приглашения водителей"]
      summary: "Отказаться от приглашения (водитель)"
      description: "Тело: token. Приглашение должно быть на номер текущего водителя. Приглашение удаляется."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200": { description: data.status = declined }
        "400": { description: invitation not found or expired }
        "403": { description: invitation was sent to another phone }

  /v1/admin/auth/login/password:
    post:
      tags: ["Admin / Auth"]
      summary: "Вход админа (логин + пароль)"
      description: |
        **Безопасность:** Проверяются только X-Device-Type, X-Language, X-Client-Token (admin token не требуется — это вход). Остальные методы Admin требуют также X-User-Token (JWT админа).
        **Поток:** Передаёте login и password из таблицы admins. В ответе — tokens (access_token, refresh_token) и объект admin. Для вызова методов Admin / Companies передавайте X-User-Token = access_token и X-Client-Token.
        **Данные:** login, password (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login: { type: string, example: "admin" }
                password: { type: string, example: "secret123" }
              required: [login, password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  admin:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      login: { type: string }
                      name: { type: string }
                      status: { type: string, example: "active" }
                      type: { type: string, example: "creator" }
        "400": { description: invalid payload }
        "401": { description: invalid login or password }

  /v1/admin/companies:
    post:
      tags: ["Admin / Companies"]
      summary: "Создать компанию (шаг 1 — без владельца)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        **Шаг 1 из 2.** Создаёт только компанию. Владелец не указывается. В теле: name (обязательно), company_type (только SHIPPER / CARRIER / BROKER), inn, address, phone, email, website, license_number, status, лимиты. В ответе — company_id. Назначить владельца — отдельно через **PATCH /v1/admin/companies/{id}/owner** (шаг 2).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "My Logistics LLC" }
                company_type: { type: string, enum: [SHIPPER, CARRIER, BROKER], nullable: true, description: "SHIPPER (грузоотправитель), CARRIER (перевозчик), BROKER (брокер)" }
                inn: { type: string, nullable: true }
                address: { type: string, nullable: true }
                phone: { type: string, nullable: true }
                email: { type: string, nullable: true }
                website: { type: string, nullable: true }
                license_number: { type: string, nullable: true }
                status: { type: string, nullable: true, example: "pending" }
                max_vehicles: { type: integer, example: 10 }
                max_drivers: { type: integer, example: 50 }
                max_cargo: { type: integer, example: 0 }
                max_dispatchers: { type: integer, example: 5 }
                max_managers: { type: integer, example: 5 }
                max_top_dispatchers: { type: integer, example: 1 }
                max_top_managers: { type: integer, example: 1 }
              required: [name]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  company_id: { type: string, format: uuid }
        "400": { description: invalid payload }
        "401": { description: unauthorized }

  /v1/admin/companies/{id}/owner:
    patch:
      tags: ["Admin / Companies"]
      summary: "Назначить владельца компании (шаг 2)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        **Шаг 2 из 2.** Привязывает владельца к компании. owner_id — UUID из **company_users** с **role=owner**. После успешного вызова: у компании — owner_id и status=active, у пользователя в company_users — company_id (двусторонняя связь).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: "UUID компании (company_id из ответа POST /v1/admin/companies)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_id]
              properties:
                owner_id: { type: string, format: uuid, description: "UUID владельца (company_users.id); у пользователя role должен быть owner" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  message: { type: string, example: "owner set, status set to active" }
        "400": { description: "invalid company id, invalid owner_id, or owner_id is not a user with role 'owner'" }
        "401": { description: unauthorized }

  /v1/admin/company-users/owners/search:
    get:
      tags: ["Admin / Companies"]
      summary: "Поиск владельцев (для назначения owner компании)"
      description: |
        **Безопасность:** Только админ. Проверяются X-Client-Token и X-User-Token (JWT с role=admin); при неверном или отсутствующем токене — 401.
        Поиск в таблице **company_users** только пользователей с **role = owner**. Поиск по телефону, имени или фамилии (параметр q). Результаты по релевантности: точное совпадение → начинается с → содержит.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: "Строка поиска (телефон, имя или фамилия); частичное совпадение, без учёта регистра"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  code: { type: integer }
                  description: { type: string }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        phone: { type: string }
                        first_name: { type: string, nullable: true }
                        last_name: { type: string, nullable: true }
                        company_id: { type: string, format: uuid, nullable: true }
                        role: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
        "401": { description: unauthorized }

  /v1/chat/conversations:
    get:
      tags: [Chat]
      summary: "Список диалогов"
      description: "Список диалогов текущего пользователя. Авторизация: X-User-Token (JWT) или X-User-ID (UUID для теста в Swagger)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.conversations = [{ id, peer_id, created_at }, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Получить или создать диалог с пользователем"
      description: "body.peer_id — UUID второго участника (водитель/диспетчер). Возвращает id диалога и peer_id."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [peer_id], properties: { peer_id: { type: string, format: uuid } } }
      responses:
        "200":
          description: "data = { id, peer_id, created_at }"
        "400": { description: invalid peer_id or same user }
        "401": { description: unauthorized }

  /v1/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: "История сообщений диалога"
      description: "Пагинация: cursor = id последнего сообщения из предыдущей страницы, limit (по умолчанию 50)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.messages = [Message, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Отправить сообщение"
      description: "body.body — текст сообщения. Сообщение сохраняется и рассылается по WebSocket участникам диалога."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "201":
          description: "data = Message"
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "404": { description: conversation not found }

  /v1/chat/messages/{id}:
    patch:
      tags: [Chat]
      summary: "Редактировать своё сообщение"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "200": { description: "data = Message" }
        "404": { description: message not found or not yours }
    delete:
      tags: [Chat]
      summary: "Удалить своё сообщение (мягкое удаление)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.deleted = true" }
        "404": { description: message not found or not yours }

  /v1/chat/presence/{user_id}:
    get:
      tags: [Chat]
      summary: "Онлайн / печатает / последний раз в сети"
      description: "Для user_id возвращает online, last_seen (unix), опционально typing в контексте conversation_id (query)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data = { user_id, online, typing?, last_seen? }" }
        "400": { description: invalid user_id }

  /v1/chat/ws:
    get:
      tags: [Chat]
      summary: "WebSocket чат"
      description: |
        Подключение к чату в реальном времени. Авторизация через query: **user_id=UUID** (для теста) или **token=JWT**.
        После подключения: отправка типа "typing" с data.conversation_id; получение событий "message" и "typing".
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: user_id
          in: query
          description: UUID пользователя (для теста без JWT)
          schema: { type: string, format: uuid }
        - name: token
          in: query
          description: JWT access token
          schema: { type: string }
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "401": { description: unauthorized }

  /v1/company-users/auth/phone:
    post:
      tags: [Company Users]
      summary: "Запросить OTP для входа/регистрации"
      description: "Отправляет OTP на номер телефона. Все владельцы/пользователи компаний проходят верификацию по OTP."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [phone], properties: { phone: { type: string } } }
      responses:
        "200": { description: "otp_sent, ttl_seconds" }
        "400": { description: "invalid phone; или no account — у номера нет аккаунта Telegram" }
        "429": { description: "otp cooldown or rate limited" }
        "502": { description: "otp send failed — OTP не отправлен (ошибка шлюза/сети)" }

  /v1/company-users/auth/otp/verify:
    post:
      tags: [Company Users]
      summary: "Проверить OTP — вход или регистрация"
      description: "Если пользователь с таким телефоном есть — возвращает status=login и tokens. Если нет — status=register и session_id для завершения регистрации."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string }
      responses:
        "200": { description: "login (tokens + user) или register (session_id)" }
        "401": { description: "otp expired or invalid" }

  /v1/company-users/registration/complete:
    post:
      tags: [Company Users]
      summary: "Завершить регистрацию (после OTP)"
      description: "Вызывается после otp/verify при status=register. Передать session_id, first_name, last_name (опц.), password. Номер телефона берётся из сессии (уже верифицирован в шаге OTP). Роль автоматически owner. В ответе — tokens и user."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, first_name, password]
              properties:
                session_id: { type: string, format: uuid }
                first_name: { type: string }
                last_name: { type: string }
                password: { type: string }
      responses:
        "200": { description: "registered, tokens + user (role=owner)" }
        "400": { description: "invalid payload or phone mismatch" }
        "401": { description: "session expired" }
        "409": { description: "phone already registered" }

  /v1/auth/companies:
    get:
      tags: [Company]
      summary: "Список компаний пользователя"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "companies with role and is_current" }
        "401": { description: "unauthorized" }

  /v1/auth/switch-company:
    post:
      tags: [Company]
      summary: "Переключить текущую компанию"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [company_id]
              properties:
                company_id: { type: string, format: uuid }
      responses:
        "200": { description: "new token + company" }
        "401": { description: "unauthorized" }
        "403": { description: "not a member" }

  /v1/companies:
    post:
      tags: [Company]
      summary: "Создать компанию"
      description: "Создатель становится OWNER. type — только SHIPPER, CARRIER или BROKER (верхний регистр)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [SHIPPER, CARRIER, BROKER], description: "Тип компании из справочника" }
                inn: { type: string }
                phone: { type: string }
                address: { type: string }
      responses:
        "201": { description: "company created" }
        "401": { description: "unauthorized" }

  /v1/companies/{companyId}/invitations:
    post:
      tags: [Company]
      summary: "Пригласить сотрудника (Owner/CEO/TopManager/TopDispatcher)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role_id]
              properties:
                email: { type: string, format: email }
                role_id: { type: string, format: uuid }
      responses:
        "201": { description: "invite_link, expires_at" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users:
    get:
      tags: [Company]
      summary: "Список сотрудников компании"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200": { description: "users with roles" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users/{userId}/role:
    put:
      tags: [Company]
      summary: "Изменить роль сотрудника"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id: { type: string, format: uuid }
      responses:
        "200": { description: "old_role, new_role" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users/{userId}:
    delete:
      tags: [Company]
      summary: "Удалить сотрудника из компании"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: "no content" }
        "403": { description: "forbidden" }

  /v1/invitations/accept:
    post:
      tags: [Company]
      summary: "Принять приглашение по токену"
      description: "Требуется X-User-Token (пользователь компании). Добавляет текущего пользователя в компанию с ролью из приглашения. Сначала войдите или зарегистрируйтесь через /v1/company-users/auth/..."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { description: "status, company_id, company_name, role, requires_registration" }
        "401": { description: "invitation not found or expired" }
