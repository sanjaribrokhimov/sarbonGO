                      data: { $ref: "#/components/schemas/ReferenceCompanyResponse" }

  /v1/reference/admin:
    get:
      tags: ["Reference / Admin"]
      summary: "Справочник Admin — статусы и типы админа"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ReferenceAdminResponse" }

  /v1/reference/dispatchers:
    get:
      tags: ["Reference / Freelance Dispatchers"]
      summary: "Справочник Freelance Dispatchers — work_status"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ReferenceDispatchersResponse" }

  /v1/auth/phone:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Запрос кода подтверждения. Телефон в формате +998XXXXXXXXX. OTP отправляется через Telegram Gateway. Ответ: status=otp_sent, ttl_seconds. Дальше — ввод кода и вызов /v1/auth/otp/verify.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
              required: [phone]
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
                required: [status, ttl_seconds]
        "400":
          description: Некорректный payload / телефон
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Cooldown / rate limit
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "502":
          description: Ошибка Telegram Gateway
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/auth/otp/verify:
    post:
      tags: ["Drivers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Ввод кода из шага 1. Если номер уже в drivers → status=login и tokens (вход выполнен). Если новый → status=register и session_id для регистрации (POST /v1/registration/start), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
      responses:
        "200":
          description: Login или сессия регистрации
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                    required: [status, tokens]
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
                    required: [status, session_id]
        "401":
          description: OTP неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "429":
          description: Превышено количество попыток
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/registration/start:
    post:
      tags: ["Drivers / Registration"]
      summary: "Шаг 3. Создать профиль (имя + оферта)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение), после otp/verify при status=register.
        **Назначение:** Создание записи в drivers: registration_status=start, registration_step=name-oferta. В ответе — tokens и объект driver; дальше все запросы с X-User-Token.
        **Данные:** session_id (из otp/verify), name, oferta_accepted (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { type: string, example: "Ali Valiyev" }
                oferta_accepted: { type: boolean, example: true }
              required: [session_id, name, oferta_accepted]
      responses:
        "200":
          description: Профиль создан + токены
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  driver: { $ref: "#/components/schemas/Driver" }
                  registration_status: { type: string, example: "start" }
                  registration_step: { type: string, example: "name-oferta" }
                required: [status, tokens]
        "401":
          description: session_id неверный/истёк
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile:
    get:
      tags: ["Drivers / Profile"]
      summary: "Получить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token (JWT).
        **Назначение:** Получение текущего профиля — все поля водителя (id, phone, name, паспорт, ТС, прицеп, registration_step, work_status и т.д.). В ответе data — объект driver.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
    delete:
      tags: ["Drivers / Profile"]
      summary: "Удалить профиль водителя"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). Обязателен X-User-Token.
        **Назначение:** Жёсткое удаление аккаунта: запись переносится в deleted_drivers, из drivers удаляется.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401":
          description: Не авторизован
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "404":
          description: Профиль не найден
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/driver:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные водителя (имя, статус, паспорт)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Частичное обновление: name, work_status (available/loaded/busy), driver_passport_series, driver_passport_number, driver_pinfl. Остальные поля не меняются.
        **Данные:** В теле только те поля, которые нужно изменить.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "Ali Valiyev" }
                work_status:
                  type: string
                  enum: ["available","loaded","busy"]
                  example: "available"
                driver_passport_series: { type: string, example: "AB" }
                driver_passport_number: { type: string, example: "1234567" }
                driver_pinfl: { type: string, example: "12345678901234" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/heartbeat:
    put:
      tags: ["Drivers / Profile"]
      summary: "Обновить гео и время последней активности"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление координат и last_online_at в профиле водителя. Все три параметра обязательны.
        **Данные:** latitude, longitude, last_online_at (RFC3339).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
                last_online_at: { type: string, format: date-time, example: "2026-02-07T12:00:00Z" }
              required: ["latitude","longitude","last_online_at"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/phone-change/request:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — запрос OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Запрос OTP на новый номер. Если номер уже занят — ошибка. Иначе OTP отправлен, возвращается session_id для шага verify.
        **Данные:** new_phone (обязательно, формат +998XXXXXXXXX).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: ["new_phone"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/phone-change/verify:
    post:
      tags: ["Drivers / Profile"]
      summary: "Смена телефона — подтверждение OTP"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Подтверждение смены телефона. Передаёте session_id из request и otp. При успехе обновляется drivers.phone; при ошибке — сообщение об ошибке.
        **Данные:** session_id, otp (обязательно).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: ["session_id","otp"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/power:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные тягача (Power Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей тягача: power_plate_number, power_tech_series, power_tech_number, power_owner_id, power_owner_name, power_scan_status.
        **Данные:** В теле только изменяемые поля тягача.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                power_plate_number: { type: string, example: "01A123BC" }
                power_tech_series: { type: string, example: "AA" }
                power_tech_number: { type: string, example: "9876543" }
                power_owner_id: { type: string, example: "12345678901234" }
                power_owner_name: { type: string, example: "Ali Valiyev" }
                power_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/profile/trailer:
    patch:
      tags: ["Drivers / Profile"]
      summary: "Редактировать данные прицепа (Trailer Unit)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Обновление полей прицепа: trailer_plate_number, trailer_tech_series, trailer_tech_number, trailer_owner_id, trailer_owner_name, trailer_scan_status.
        **Данные:** В теле только изменяемые поля прицепа.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trailer_plate_number: { type: string, example: "01A123BC" }
                trailer_tech_series: { type: string, example: "AA" }
                trailer_tech_number: { type: string, example: "9876543" }
                trailer_owner_id: { type: string, example: "12345678901234" }
                trailer_owner_name: { type: string, example: "Ali Valiyev" }
                trailer_scan_status: { type: boolean, example: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/registration/geo-push:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 4. Указать гео и push-токен"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** При передаче latitude и longitude — registration_step переводится в geo-push (если ещё не transport-type). push_token сохраняется в любом случае. Без гео шаг не меняется.
        **Данные:** latitude, longitude (опц.), push_token (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                latitude: { type: number, format: double, example: 41.311081 }
                longitude: { type: number, format: double, example: 69.240562 }
                push_token: { type: string, example: "optional-device-token" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/registration/transport-type:
    patch:
      tags: ["Drivers / Registration"]
      summary: "Шаг 5. Выбрать тип транспорта"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Указание типа водителя и ТС. После успешного запроса: registration_step=transport-type, registration_status=basic. Справочники кодов: GET /v1/transport-options.
        **Данные:** driver_type (company/freelancer/driver), power_plate_type, trailer_plate_type (обязательно); freelancer_id, company_id (опц.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_type:
                  type: string
                  enum: ["company","freelancer","driver"]
                  example: "driver"
                power_plate_type:
                  type: string
                  example: "uz_private"
                trailer_plate_type:
                  type: string
                  example: "uz_private"
                freelancer_id: { type: string, format: uuid, nullable: true }
                company_id: { type: string, format: uuid, nullable: true }
              required: ["driver_type","power_plate_type","trailer_plate_type"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, driver]

  /v1/kyc:
    patch:
      tags: ["Drivers / KYC"]
      summary: "Отправить KYC (паспорт, ТС, прицеп)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение). X-User-Token обязателен.
        **Назначение:** Загрузка документов: driver_data (паспорт, PINFL, driver_scan_status), power_data (тягач: номер, техпаспорт, владелец, power_scan_status), trailer_data (прицеп — то же или не указывать), driver_owner (true/false). registration_status=full выставляется только при полном и подтверждённом заполнении (scan_status=true где нужно).
        **Данные:** driver_owner, driver_data, power_data, trailer_data (все блоки обязательны).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_owner: { type: boolean, example: true }
                driver_data:
                  type: object
                  properties:
                    driver_passport_series: { type: string, example: "AB" }
                    driver_passport_number: { type: string, example: "1234567" }
                    driver_pinfl: { type: string, example: "12345678901234" }
                    driver_scan_status: { type: boolean, example: true }
                  required: ["driver_passport_series","driver_passport_number","driver_pinfl","driver_scan_status"]
                power_data:
                  type: object
                  properties:
                    power_plate_number: { type: string, example: "01A123BC" }
                    power_tech_series: { type: string, example: "AA" }
                    power_tech_number: { type: string, example: "9876543" }
                    power_owner_id: { type: string, example: "12345678901234" }
                    power_owner_name: { type: string, example: "Ali Valiyev" }
                    power_scan_status: { type: boolean, example: true }
                  required: ["power_plate_number","power_tech_series","power_tech_number","power_owner_id","power_owner_name","power_scan_status"]
                trailer_data:
                  type: object
                  properties:
                    trailer_plate_number: { type: string, example: "01A123BC" }
                    trailer_tech_series: { type: string, example: "AA" }
                    trailer_tech_number: { type: string, example: "9876543" }
                    trailer_owner_id: { type: string, example: "12345678901234" }
                    trailer_owner_name: { type: string, example: "Ali Valiyev" }
                    trailer_scan_status: { type: boolean, example: true }
                  required: ["trailer_plate_number","trailer_tech_series","trailer_tech_number","trailer_owner_id","trailer_owner_name","trailer_scan_status"]
              required:
                - driver_owner
                - driver_data
                - power_data
                - trailer_data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  is_full: { type: boolean, example: true }
                  driver: { $ref: "#/components/schemas/Driver" }
                required: [status, is_full, driver]

  /v1/auth/refresh:
    post:
      tags: ["Drivers / Auth"]
      summary: "Обновить JWT токены"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение) или любой клиент с истёкшим access_token.
        **Назначение:** Выдача новой пары токенов по refresh_token. В ответе — tokens (access_token, refresh_token, expires_in).
        **Данные:** refresh_token (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }
                required: [tokens]
        "401":
          description: Неверный refresh token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /v1/auth/logout:
    post:
      tags: ["Drivers / Auth"]
      summary: "Выход (отзыв refresh token)"
      description: |
        **Кто вызывает:** Водитель (мобильное приложение).
        **Назначение:** Инвалидация refresh_token. После вызова этот refresh_token больше нельзя использовать для /v1/auth/refresh.
        **Данные:** refresh_token (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                required: [status]

  /v1/dispatchers/auth/phone:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 1. Отправить OTP на телефон"
      description: |
        **Поток:** Ввод телефона в формате +998XXXXXXXXX → запрос отправляет OTP через Telegram Gateway. Код приходит в Telegram/смс. Используется и для входа (существующий диспетчер), и для регистрации (новый номер). Ответ: status=otp_sent, ttl_seconds.
        **Данные:** В теле только phone (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
              required: [phone]
      responses:
        "200":
          description: OTP отправлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  ttl_seconds: { type: integer, example: 180 }
        "400": { description: Некорректный payload }
        "429": { description: Cooldown / rate limit }
        "502": { description: Ошибка Telegram Gateway }

  /v1/dispatchers/auth/otp/verify:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Шаг 2. Подтвердить OTP"
      description: |
        **Поток:** Передаёте phone и otp (код из шага 1). Если диспетчер уже зарегистрирован → в ответе status=login и tokens (access_token, refresh_token) — вход выполнен. Если телефон новый → status=register и session_id — переходите к регистрации (POST /v1/dispatchers/registration/complete), JWT пока не выдаётся.
        **Данные:** phone, otp (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
                otp: { type: string, example: "123456" }
              required: [phone, otp]
      responses:
        "200":
          description: login (tokens) или register (session_id)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status: { type: string, example: "login" }
                      tokens: { $ref: "#/components/schemas/Tokens" }
                  - type: object
                    properties:
                      status: { type: string, example: "register" }
                      session_id: { type: string, format: uuid }
        "401": { description: OTP неверный/истёк }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/auth/login/password:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: "Вход по паролю (без OTP)"
      description: |
        **Поток:** Для уже зарегистрированного диспетчера. Передаёте phone и password → в ответе tokens. Дальше все запросы к профилю и т.д. с заголовком X-User-Token = access_token.
        **Данные:** phone, password (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
                password: { type: string, example: "secret" }
              required: [phone, password]
      responses:
        "200":
          description: OK, tokens в data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "login" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
        "401": { description: Неверный телефон или пароль }

  /v1/dispatchers/auth/reset-password/request:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Запросить OTP для сброса пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string, example: "+998331108810" }
              required: [phone]
      responses:
        "200":
          description: OTP отправлен, session_id для confirm
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "404": { description: Диспетчер не найден }
        "502": { description: Ошибка Telegram Gateway }

  /v1/dispatchers/auth/reset-password/confirm:
    post:
      tags: ["Freelance Dispatchers / Auth"]
      summary: Подтвердить сброс пароля (session_id + otp + new_password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
                new_password: { type: string }
              required: [session_id, otp, new_password]
      responses:
        "200":
          description: Пароль обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Сессия/OTP неверны }
        "429": { description: Превышено количество попыток }

  /v1/dispatchers/registration/complete:
    post:
      tags: ["Freelance Dispatchers / Registration"]
      summary: "Шаг 3. Завершить регистрацию (имя, пароль, паспорт)"
      description: |
        **Поток:** Вызывается после otp/verify, когда получен status=register и session_id. В теле передаёте session_id (обязательно), name, password, passport_series, passport_number, pinfl (все обязательны), photo (опционально). Создаётся запись в freelance_dispatchers, в ответе — tokens и объект dispatcher. После этого диспетчер может входить по phone+password или по OTP.
        **Данные:** session_id, name, password, passport_series, passport_number, pinfl; опционально photo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                name: { type: string, example: "Dispetcher Name" }
                password: { type: string }
                passport_series: { type: string, example: "AB" }
                passport_number: { type: string, example: "1234567" }
                pinfl: { type: string, example: "12345678901234" }
                photo: { type: string, nullable: true }
              required: [session_id, name, password, passport_series, passport_number, pinfl]
      responses:
        "200":
          description: Зарегистрирован или логин (если телефон уже был)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "registered" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: session_id неверный/истёк }
        "409": { description: Телефон уже зарегистрирован }

  /v1/dispatchers/profile:
    get:
      tags: ["Freelance Dispatchers / Profile"]
      summary: "Получить профиль диспетчера"
      description: |
        **Поток:** Запрос с заголовком X-User-Token (JWT access_token). В ответе data.dispatcher — объект диспетчера (id, name, phone, паспорт, pinfl, work_status, rating и т.д.).
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK, data.dispatcher
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    patch:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Редактировать профиль диспетчера
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                passport_series: { type: string }
                passport_number: { type: string }
                pinfl: { type: string }
                photo: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
    delete:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Удалить профиль диспетчера (архивация)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "401": { description: Не авторизован }
        "404": { description: Диспетчер не найден }

  /v1/dispatchers/profile/password:
    put:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Сменить пароль (текущий + новый)
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password: { type: string }
                new_password: { type: string }
              required: [current_password, new_password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
        "401": { description: Неверный current_password }

  /v1/dispatchers/profile/phone-change/request:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — запрос OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_phone: { type: string, example: "+998901234567" }
              required: [new_phone]
      responses:
        "200":
          description: OTP отправлен, session_id для verify
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "otp_sent" }
                  session_id: { type: string, format: uuid }
                  ttl_seconds: { type: integer }
        "409": { description: Телефон уже зарегистрирован }
        "502": { description: Ошибка Telegram Gateway }

  /v1/dispatchers/profile/phone-change/verify:
    post:
      tags: ["Freelance Dispatchers / Profile"]
      summary: Смена телефона — подтверждение OTP
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                otp: { type: string, example: "123456" }
              required: [session_id, otp]
      responses:
        "200":
          description: Телефон обновлён
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  dispatcher: { $ref: "#/components/schemas/Dispatcher" }
        "401": { description: Сессия/OTP неверны }
        "409": { description: Телефон уже занят }

  /v1/admin/auth/login/password:
    post:
      tags: ["Admin / Auth"]
      summary: "Вход админа (логин + пароль)"
      description: |
        **Поток:** Передаёте login и password из таблицы admins. В ответе — tokens (access_token, refresh_token) и объект admin (id, login, name, status, type). Для вызова методов Admin / Companies передавайте заголовок X-User-Token = access_token.
        **Данные:** login, password (обязательно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login: { type: string, example: "admin" }
                password: { type: string, example: "secret123" }
              required: [login, password]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  tokens: { $ref: "#/components/schemas/Tokens" }
                  admin:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      login: { type: string }
                      name: { type: string }
                      status: { type: string, example: "active" }
                      type: { type: string, example: "creator" }
        "400": { description: invalid payload }
        "401": { description: invalid login or password }

  /v1/admin/companies:
    post:
      tags: ["Admin / Companies"]
      summary: "Создать компанию (только админ)"
      description: |
        **Поток:** Вызывается только с JWT админа (X-User-Token). В теле передаёте name (обязательно), остальные поля опциональны: inn, address, phone, email, website, license_number, status, лимиты (max_vehicles, max_drivers, max_cargo, max_dispatchers, max_managers, max_top_dispatchers, max_top_managers). Создаётся одна запись в таблице companies. При создании поле **status** по умолчанию **active**, если не передан иной (далее можно сменить на inactive, blocked, pending). В ответе — status и company_id (UUID новой компании). Лимиты задают квоты для этой компании.
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "My Logistics LLC" }
                inn: { type: string, nullable: true }
                address: { type: string, nullable: true }
                phone: { type: string, nullable: true }
                email: { type: string, nullable: true }
                website: { type: string, nullable: true }
                license_number: { type: string, nullable: true }
                status: { type: string, nullable: true, example: "pending" }
                max_vehicles: { type: integer, example: 10 }
                max_drivers: { type: integer, example: 50 }
                max_cargo: { type: integer, example: 0 }
                max_dispatchers: { type: integer, example: 5 }
                max_managers: { type: integer, example: 5 }
                max_top_dispatchers: { type: integer, example: 1 }
                max_top_managers: { type: integer, example: 1 }
              required: [name]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  company_id: { type: string, format: uuid }
        "400": { description: invalid payload }
        "401": { description: unauthorized }

  /v1/chat/conversations:
    get:
      tags: [Chat]
      summary: "Список диалогов"
      description: "Список диалогов текущего пользователя. Авторизация: X-User-Token (JWT) или X-User-ID (UUID для теста в Swagger)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.conversations = [{ id, peer_id, created_at }, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Получить или создать диалог с пользователем"
      description: "body.peer_id — UUID второго участника (водитель/диспетчер). Возвращает id диалога и peer_id."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [peer_id], properties: { peer_id: { type: string, format: uuid } } }
      responses:
        "200":
          description: "data = { id, peer_id, created_at }"
        "400": { description: invalid peer_id or same user }
        "401": { description: unauthorized }

  /v1/chat/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: "История сообщений диалога"
      description: "Пагинация: cursor = id последнего сообщения из предыдущей страницы, limit (по умолчанию 50)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: "data.messages = [Message, ...]"
        "401": { description: unauthorized }
    post:
      tags: [Chat]
      summary: "Отправить сообщение"
      description: "body.body — текст сообщения. Сообщение сохраняется и рассылается по WebSocket участникам диалога."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "201":
          description: "data = Message"
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "404": { description: conversation not found }

  /v1/chat/messages/{id}:
    patch:
      tags: [Chat]
      summary: "Редактировать своё сообщение"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string } } }
      responses:
        "200": { description: "data = Message" }
        "404": { description: message not found or not yours }
    delete:
      tags: [Chat]
      summary: "Удалить своё сообщение (мягкое удаление)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data.deleted = true" }
        "404": { description: message not found or not yours }

  /v1/chat/presence/{user_id}:
    get:
      tags: [Chat]
      summary: "Онлайн / печатает / последний раз в сети"
      description: "Для user_id возвращает online, last_seen (unix), опционально typing в контексте conversation_id (query)."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }, { UserIDHeader: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: conversation_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200": { description: "data = { user_id, online, typing?, last_seen? }" }
        "400": { description: invalid user_id }

  /v1/chat/ws:
    get:
      tags: [Chat]
      summary: "WebSocket чат"
      description: |
        Подключение к чату в реальном времени. Авторизация через query: **user_id=UUID** (для теста) или **token=JWT**.
        После подключения: отправка типа "typing" с data.conversation_id; получение событий "message" и "typing".
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      parameters:
        - name: user_id
          in: query
          description: UUID пользователя (для теста без JWT)
          schema: { type: string, format: uuid }
        - name: token
          in: query
          description: JWT access token
          schema: { type: string }
      responses:
        "101": { description: Switching Protocols (WebSocket) }
        "401": { description: unauthorized }

  /v1/auth/register:
    post:
      tags: [Company]
      summary: "Регистрация пользователя"
      description: "Создаёт пользователя (app_users). Обязательны X-Device-Type, X-Language, X-Client-Token."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
      responses:
        "201": { description: "created, returns user + token" }
        "400": { description: "invalid payload" }
        "409": { description: "email already registered" }

  /v1/auth/login:
    post:
      tags: [Company]
      summary: "Вход в систему"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: "token + user" }
        "401": { description: "invalid email or password" }

  /v1/auth/companies:
    get:
      tags: [Company]
      summary: "Список компаний пользователя"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      responses:
        "200": { description: "companies with role and is_current" }
        "401": { description: "unauthorized" }

  /v1/auth/switch-company:
    post:
      tags: [Company]
      summary: "Переключить текущую компанию"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [company_id]
              properties:
                company_id: { type: string, format: uuid }
      responses:
        "200": { description: "new token + company" }
        "401": { description: "unauthorized" }
        "403": { description: "not a member" }

  /v1/companies:
    post:
      tags: [Company]
      summary: "Создать компанию"
      description: "Создатель становится Owner. Тип: Shipper, Broker, Fleet, OwnerOperator."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [Shipper, Broker, Fleet, OwnerOperator] }
                inn: { type: string }
                phone: { type: string }
                address: { type: string }
      responses:
        "201": { description: "company created" }
        "401": { description: "unauthorized" }

  /v1/companies/{companyId}/invitations:
    post:
      tags: [Company]
      summary: "Пригласить сотрудника (Owner/CEO/TopManager/TopDispatcher)"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role_id]
              properties:
                email: { type: string, format: email }
                role_id: { type: string, format: uuid }
      responses:
        "201": { description: "invite_link, expires_at" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users:
    get:
      tags: [Company]
      summary: "Список сотрудников компании"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200": { description: "users with roles" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users/{userId}/role:
    put:
      tags: [Company]
      summary: "Изменить роль сотрудника"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id: { type: string, format: uuid }
      responses:
        "200": { description: "old_role, new_role" }
        "403": { description: "forbidden" }

  /v1/companies/{companyId}/users/{userId}:
    delete:
      tags: [Company]
      summary: "Удалить сотрудника из компании"
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }, { UserTokenHeader: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: "no content" }
        "403": { description: "forbidden" }

  /v1/invitations/accept:
    post:
      tags: [Company]
      summary: "Принять приглашение по токену"
      description: "Без авторизации. Если пользователь с email не зарегистрирован — requires_registration true."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { description: "status, company_id, company_name, role, requires_registration" }
        "401": { description: "invitation not found or expired" }
