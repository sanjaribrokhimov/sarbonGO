      summary: "Справочник Cargo — статусы груза, точки, офферы, типы ТС"
      description: "Все допустимые значения для раздела грузов."
      security: [{ DeviceTypeHeader: [] }, { LanguageHeader: [] }, { ClientTokenHeader: [] }]
